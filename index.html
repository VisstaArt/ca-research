        <input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder={t.lockPlaceholder} autoFocus
          style={{width:'100%',boxSizing:'border-box',padding:'10px 12px',fontSize:14,border:'1px solid '+(err?'#d33':'#ddd'),borderRadius:8,outline:'none',marginBottom:10}} />
        {err && <div style={{fontSize:11,color:'#d33',marginBottom:10}}>{t.lockError}</div>}
        <button type="submit" disabled={busy||!pw.trim()}
          style={{width:'100%',padding:'10px 0',fontSize:14,fontWeight:500,color:'#fff',background:busy?'#999':'#111',border:'none',borderRadius:8,cursor:'pointer'}}>
          {busy ? '…' : t.lockButton}
        </button>
      </form>
    </div>
  );
}

function App() {
  const [uiLang, setUiLang] = React.useState(loadUiLang);
  const t = T[uiLang];

  // Защита доступа: null = проверяем, true = открыто, false = нужен пароль
  const [unlocked, setUnlocked] = React.useState(null);
  React.useEffect(() => {
    pingProxy(getAppKey()).then(ok => setUnlocked(ok)).catch(() => setUnlocked(false));
  }, []);

  const [sc, setSc] = React.useState('list');
  const [projs, setProjs] = React.useState(() => loadAll());
  const [proj, setProj] = React.useState(null);

  const empty = { name:'', niche:'', geoCompany:'', geoMarket:'', format:'', audience:'', result:'', price:'', competitors:'', extra:'', currentRevenue:'', currentClients:'', currentAvgCheck:'', targetSegment:'', priceLayer:'', services:[], selectedServices:[], selectedNiche:'', nicheCandidates:'' };
  const [brief, setBrief] = React.useState(empty);
  const [lang, setLang] = React.useState('Russian');
  const [mods, setMods] = React.useState(['M1_2','M2']);
  const [siteUrl, setSiteUrl] = React.useState('');
  const [parsing, setParsing] = React.useState(false);
  const [pMsg, setPMsg] = React.useState('');
  const [blockMsg, setBlockMsg] = React.useState(''); // «модуль не стартует без предыдущих стадий»

  const [curMod, setCurMod] = React.useState(null);
  const [curNiche, setCurNiche] = React.useState('');
  const [curStep, setCurStep] = React.useState('');
  const [curStepIdx, setCurStepIdx] = React.useState(0);
  const [exp, setExp] = React.useState({});
  const [rep, setRep] = React.useState('');
  const [repping, setRepping] = React.useState(false);
  const [repOpen, setRepOpen] = React.useState(false);
  const [xl, setXl] = React.useState('');
  const [xlating, setXlating] = React.useState(false);
  const [xled, setXled] = React.useState('');

  // Price layer state
  const [showNiches, setShowNiches] = React.useState(false);
  const [nicheOpts, setNicheOpts] = React.useState([]);
  const [selNiches, setSelNiches] = React.useState([]);
  const [showLayers, setShowLayers] = React.useState(false);
  const [priceLayers, setPriceLayers] = React.useState([]);
  const [selectedLayers, setSelectedLayers] = React.useState([]);
  const [generatingLayers, setGeneratingLayers] = React.useState(false);

  const switchUiLang = () => { const nl = uiLang==='en'?'ru':'en'; setUiLang(nl); saveUiLang(nl); };

  const ref = () => setProjs(loadAll());
  const sv = React.useCallback(p => { upsert(p); ref(); return p; }, []);

  // Site reading
  const parseSite = React.useCallback(async () => {
    if (!siteUrl.trim()) return;
    setParsing(true); setPMsg('⟳ Reading site pages…');
    try {
      const pages = await fetchSite(siteUrl.trim());
      if (!pages.length) throw new Error('No readable content found. Fill manually.');
      const combined = pages.map(p=>'['+p.url+']\n'+p.text).join('\n\n---\n\n');
      setPMsg('⟳ Read '+pages.length+' page(s) — extracting brief…');
      const result = await callGPT(
        'Extract a marketing brief from website content. Reply ONLY with valid JSON, no markdown.',
        'Extract from:\n\n'+combined+'\n\nReturn ONLY:\n{"name":"","niche":"","geoCompany":"all markets company operates in","geoMarket":"primary research market","format":"","audience":"","result":"","price":"","competitors":"","extra":"","services":["list of distinct services/products/directions offered on the site, in the site\'s language, 3-15 items"],"lang":"detected language e.g. Turkish"}'
      );
      const d = JSON.parse(result.replace(/```json|```/g,'').trim());
      setBrief(p => ({...p, ...Object.fromEntries(Object.entries(d).filter(([k,v])=>k!=='lang'&&v&&empty.hasOwnProperty(k)))}));
      if (Array.isArray(d.services) && d.services.length) setBrief(p => ({...p, services: d.services.map(String), selectedServices: []}));
      if (d.lang) { const m=LANGS.find(l=>l.toLowerCase()===d.lang.toLowerCase()); if(m) setLang(m); }
      setPMsg('✓ Brief filled from '+pages.length+' page(s) — review below');
    } catch(e) { setPMsg('✗ ' + e.message); }
    setParsing(false);
  }, [siteUrl]);

  const openP = p => {
    const b={...(p.brief||{})};
    if(b.geo&&!b.geoMarket){b.geoMarket=b.geo;delete b.geo;}
    setProj(p); setBrief({...empty,...b}); setLang(p.lang||'Russian');
    setMods((p.mods||['M1_2','M2']).filter(id => !MODULES.find(m=>m.id===id)?.disabled)); setRep(p.report||'');
    setExp({}); setRepOpen(false); setXled('');
    setShowLayers(false); setPriceLayers(p.priceLayers||[]); setSelectedLayers(p.selectedLayers||[]);
    // Если разведка сделана, а ниша ещё не выбрана — восстановить стоп-точку выбора
    const m12 = (p.results||[]).find(r=>r.id==='M1_2');
    if (m12 && !b.selectedNiche) {
      const nd = m12.nicheData || extractNicheData(m12.content||'');
      const niches = (nd && Array.isArray(nd.niches) ? nd.niches : []).slice().sort((a,b)=>(b.score||0)-(a.score||0));
      if (niches.length) {
        setNicheOpts(niches);
        const rec = niches.findIndex(x=>x.recommended);
        setSelNiches(rec>=0?[rec]:[]);
        setShowNiches(true);
      } else setShowNiches(false);
    } else setShowNiches(false);
    setSc('work');
  };

  // Save brief to project when returning from edit form
  const saveBriefToProject = React.useCallback(() => {
    if (proj) {
      const upd = {...proj, brief, lang, updatedAt: new Date().toISOString()};
      setProj(upd);
      sv(upd);
    }
  }, [proj, brief, lang, sv]);

  const goNew = () => {
    setProj(null); setBrief(empty); setLang('Russian'); setMods(['M1_2','M2']);
    setSiteUrl(''); setPMsg(''); setRep(''); setExp({}); setRepOpen(false); setXled('');
    setShowLayers(false); setPriceLayers([]); setSelectedLayers([]);
    setSc('form');
  };

  // Extract chart data — flexible parser (handles markdown code blocks too)
  // Модель выдаёт маркеры по-разному: <<<CHART_DATA_START>>> ИЛИ ### CHART_DATA_START.
  // Принимаем оба; JSON достаём по первой { и последней } — так не мешают обёртки в тройных кавычках.
  const extractJsonBlock = (content, kind) => {
    const startRe = new RegExp(kind+'_START(?:>>>)?([\\s\\S]*?)(?:#{1,6}\\s*|<<<)?'+kind+'_END');
    const m = content.match(startRe);
    const raw = m ? m[1] : (content.match(new RegExp(kind+'_START([\\s\\S]*)'))||[])[1];
    if (!raw) return null;
    const a = raw.indexOf('{'), b = raw.lastIndexOf('}');
    if (a < 0 || b <= a) return null;
    try { return JSON.parse(raw.slice(a, b+1)); } catch { return null; }
  };
  const extractChartData = content => extractJsonBlock(content, 'CHART_DATA');
  const extractNicheData = content => extractJsonBlock(content, 'NICHE_DATA');

  const cleanContent = content => content
    .replace(/(?:#{1,6}\s*|<<<)?CHART_DATA_START[\s\S]*?CHART_DATA_END(?:>>>)?/g,'')
    .replace(/(?:#{1,6}\s*|<<<)?CHART_DATA_START[\s\S]*/g,'')
    .replace(/(?:#{1,6}\s*|<<<)?NICHE_DATA_START[\s\S]*?NICHE_DATA_END(?:>>>)?/g,'')
    .replace(/(?:#{1,6}\s*|<<<)?NICHE_DATA_START[\s\S]*/g,'')
    // Голый заголовок «CHART DATA» / «NICHE DATA» и декоративные линии ═ — модель их печатает
    // как заголовок секции перед блоком данных; сам блок уже вырезан выше, заголовок остаётся пустым.
    .replace(/^[ \t]*#{0,6}[ \t]*(?:CHART|NICHE)[ _]?DATA[ \t]*$/gim,'')
    .replace(/^[ \t]*═+[ \t]*$/gm,'')
    .trim();

  // Generate price layers after M1
  const generatePriceLayers = React.useCallback(async (m1Content) => {
    setGeneratingLayers(true);
    try {
      const result = await callGPT(
        'You are a market analyst. Analyze the M1 research data and identify 3 price layers in the market. Reply ONLY with valid JSON, no markdown or explanation.',
        'Based on this M1 research:\n\n'+m1Content.slice(0,3000)+'\n\nIdentify exactly 3 price layers. Return ONLY this JSON:\n[{"name":"Economy — basic services","priceRange":"price range with currency","som":"~N clients/year","competition":"High/Medium/Low","efficiency":"~Nx","players":["player1","player2","player3"]},{"name":"Mid-market — analytics & recommendations","priceRange":"...","som":"...","competition":"...","efficiency":"...","players":["..."]},{"name":"Premium — full outsourcing","priceRange":"...","som":"...","competition":"...","efficiency":"...","players":["..."]}]'
      );
      const cleaned = result.replace(/```json|```/g,'').trim();
      const layers = JSON.parse(cleaned);
      setPriceLayers(layers);
      return layers;
    } catch(e) {
      // fallback generic layers
      const fallback = [
        {name:'Economy — basic services', priceRange:'—', som:'—', competition:'High', efficiency:'—', players:[]},
        {name:'Mid-market — analytics & recommendations', priceRange:'—', som:'—', competition:'Medium', efficiency:'—', players:[]},
        {name:'Premium — full outsourcing', priceRange:'—', som:'—', competition:'Low', efficiency:'—', players:[]},
      ];
      setPriceLayers(fallback);
      return fallback;
    } finally { setGeneratingLayers(false); }
  }, []);

  const getModulePrompt = (modId, brief, lang, prevContent) => {
    // Не режем здесь: каждый промпт сам решает, сколько контекста ему нужно.
    // Прежняя обрезка до 2000 символов накладывалась на обрезку внутри промпта.
    const p = prevContent || '';
    switch(modId) {
      case 'M1': return buildM1Prompt(brief, lang, p);
      case 'M2': return buildM2Prompt(brief, lang, p);
      case 'M3': return buildM3Prompt(brief, lang, p);
      case 'M4': return buildM4Prompt(brief, lang, p);
      case 'M5': return buildM5Prompt(brief, lang, p);
      case 'M6': return buildM6Prompt(brief, lang, p);
      case 'M7': return buildM7Prompt(brief, lang, p);
      default: return 'Research module '+modId+' for this project in '+lang+'.';
    }
  };

  // briefOverride: свежий бриф для запуска сразу после setBrief (стейт обновляется асинхронно,
  // без override модули получили бы старый бриф без выбранной ниши/слоя)
  const run = React.useCallback(async (modsToRun, briefOverride, forceRerun, rerunNiche) => {
    const B = briefOverride || brief;
    if (!B.name) return;
    const id = proj?.id || ('p' + Date.now());
    const allSelected = modsToRun || mods;
    const niches = nichesOf(B);

    // Единицы работы = модуль × ниша. Глобальные модули — один раз (ниша ''),
    // по-нишевые — по разу на каждую выбранную нишу. rerunNiche ограничивает
    // перегенерацию одной нишей (кнопка ↺ на её модуле).
    const expand = m => {
      if (!isPerNiche(m.id)) return [{ mod: m, niche: '' }];
      const list = rerunNiche ? [rerunNiche] : niches;
      return list.map(n => ({ mod: m, niche: n }));
    };
    const wkey = w => w.mod.id + '@@' + w.niche;
    const selMods = MODULES.filter(m => !m.disabled && allSelected.includes(m.id));

    // forceRerun (перегенерация): выкидываем старые результаты именно запрошенных единиц,
    // иначе run() видит их и пропускает — «секунда без поиска».
    const wantKeys = new Set(selMods.flatMap(expand).map(wkey));
    const existing = forceRerun
      ? (proj?.results || []).filter(r => !wantKeys.has(r.id + '@@' + (r.niche || '')))
      : (proj?.results || []);
    const doneKeys = new Set(existing.map(r => r.id + '@@' + (r.niche || '')));

    let work = selMods.flatMap(expand).filter(w => !doneKeys.has(wkey(w)));
    if (!work.length) { setSc('work'); return; }

    // Порядок: глобальные сначала, затем ниша за нишей (внутри — порядок модулей).
    // Так цепочка зависимостей внутри ниши связная, и результаты сразу сгруппированы.
    const modOrder = MODULES.map(m => m.id);
    work.sort((a, b) => {
      const ga = a.niche === '', gb = b.niche === '';
      if (ga !== gb) return ga ? -1 : 1;
      if (a.niche !== b.niche) return a.niche < b.niche ? -1 : 1;
      return modOrder.indexOf(a.mod.id) - modOrder.indexOf(b.mod.id);
    });

    // Зависимости per (модуль, ниша): у по-нишевого модуля данные берутся из его же ниши.
    const ready = new Set(doneKeys);
    const plannedKeys = new Set(work.map(wkey));
    const runnable = [];
    const blockedMods = [];
    for (const w of work) {
      const missing = (w.mod.requires || []).filter(dep => {
        const dk = dep + '@@' + (isPerNiche(dep) ? w.niche : '');
        return !ready.has(dk) && !plannedKeys.has(dk);
      });
      if (missing.length) { blockedMods.push((w.mod.label || w.mod.id) + (w.niche ? ' ['+w.niche+']' : '') + ' — нужен ' + missing.join(', ')); continue; }
      runnable.push(w);
      ready.add(wkey(w));
    }
    if (blockedMods.length) {
      setBlockMsg('Прогон не начат. ' + blockedMods.join('; ') + '. Эти модули строятся на данных предыдущих стадий: отметьте недостающие модули в списке или перегенерируйте цепочку кнопкой ↺ на более раннем модуле.');
      return;
    }
    setBlockMsg('');

    const p = { id, createdAt: proj?.createdAt||new Date().toISOString(), updatedAt: new Date().toISOString(), brief: B, lang, mods:allSelected, results:existing, report:proj?.report||'', priceLayers, selectedLayers };
    setProj(p); setRep(p.report); sv(p); setSc('work');

    const col = [...existing];

    for (const w of runnable) {
      const mod = w.mod, wn = w.niche;
      // Бриф, сфокусированный на одной нише: фильтр ниш и запросы поиска сужаются до неё.
      const Bn = wn ? { ...B, selectedNiche: wn } : B;
      const sys = buildSystem(Bn, lang);
      setCurMod(mod.id); setCurNiche(wn); setCurStep(mod.steps[0]); setCurStepIdx(0);
      let stepI = 0;
      const stepTimer = setInterval(() => {
        stepI = Math.min(stepI+1, mod.steps.length-1);
        setCurStep(mod.steps[stepI]); setCurStepIdx(stepI);
      }, Math.floor((mod.estimatedMin*60*1000)/mod.steps.length));

      // Контекст берём из результатов ТОЙ ЖЕ ниши (для по-нишевых зависимостей).
      const findDep = depId => col.find(r => r.id === depId && (isPerNiche(depId) ? (r.niche||'') === wn : true));

      let full = '';
      try {
        const sameNiche = col.filter(r => (r.niche||'') === wn);
        const prevContent = sameNiche.length ? sameNiche[sameNiche.length-1].content : '';
        let userPrompt;
        if (mod.id === 'M1_2') {
          // Разведка ниш: сначала собираем реальные выдержки из веб-поиска
          const evidence = await gatherNicheEvidence(Bn, lang);
          userPrompt = buildM12Prompt(Bn, lang, prevContent ? prevContent.slice(0, 2000) : '', evidence);
        } else if (mod.id === 'M2') {
          // Конкуренты: реальное досье вместо памяти модели
          const evidence = await gatherCompetitorEvidence(Bn);
          userPrompt = buildM2Prompt(Bn, lang, prevContent || '', evidence);
        } else if (mod.id === 'M3') {
          // VoC: живые цитаты только из реального поиска.
          // Конкурентов берём из уже готового M2 ТОЙ ЖЕ ниши — по ним ищем жалобы.
          const comps = competitorsFromM2(findDep('M2'), Bn);
          const evidence = await gatherVoCEvidence(Bn, comps);
          userPrompt = buildM3Prompt(Bn, lang, prevContent || '', evidence, comps);
        } else if (mod.id === 'M7') {
          // SEO: реальная выдача по целевым запросам вместо частотностей «из памяти»
          const evidence = await gatherSeoEvidence(Bn);
          userPrompt = buildM7Prompt(Bn, lang, prevContent || '', evidence);
        } else {
          // Контекст берём от стадии, на которой модуль СТРОИТСЯ (requires), в рамках своей ниши,
          // и целиком: без полного M3 модуль M4 не видит цитат VoC и вынужден их выдумывать.
          const depId = (mod.requires || [])[0];
          const depRes = depId ? findDep(depId) : null;
          userPrompt = getModulePrompt(mod.id, Bn, lang, depRes ? depRes.content : prevContent);
        }
        // M1.2 (разведка ниш) — низкая температура: нужна полнота и повторяемость,
        // а не разные ниши каждый прогон. Остальные модули — дефолт модели.
        const temp = mod.id === 'M1_2' ? 0.3 : undefined;
        // M1.2 просят 10-20+ вертикалей, каждая — строка в BLOCK 04_1 И в 04_2 плюс
        // запись в JSON, плюс до 50 строк источников в 04_0 — общий потолок 8000 токенов
        // не вмещает это целиком, и модель тихо сжимается до "безопасных" ~8 ниш.
        const maxTok = mod.id === 'M1_2' ? 16000 : undefined;
        full = await callGPT(sys, userPrompt, temp, maxTok);
      } catch(e) { full = 'Error: '+e.message; }
      clearInterval(stepTimer);

      const usage = lastGptUsage;
      const chartData = extractChartData(full);
      const nicheData = mod.id === 'M1_2' ? extractNicheData(full) : null;
      const cleanedContent = cleanContent(full);
      const result = { id:mod.id, niche:wn, content:cleanedContent, chartData, ...(nicheData?{nicheData}:{}), ...(usage?{usage}:{}), at:new Date().toISOString() };
      col.push(result);
      const upd = { ...p, results:col, updatedAt:new Date().toISOString() };
      setProj(upd); sv(upd);
      setExp(ex => ({...ex, [resKey(result)]:false}));

      // After M1.2 — стоп: человек выбирает нишу (только при первичной разведке, не при перегенерации ниши)
      if (mod.id === 'M1_2' && !rerunNiche) {
        setCurMod(null); setCurNiche(''); setCurStep(''); setCurStepIdx(0);
        const nn = (nicheData && Array.isArray(nicheData.niches) ? nicheData.niches : []).slice().sort((a,b)=>(b.score||0)-(a.score||0));
        setNicheOpts(nn);
        const rec = nn.findIndex(x => x.recommended);
        setSelNiches(rec >= 0 ? [rec] : []);
        setShowNiches(true);
        return; // ждём выбора ниш(и)
      }

      // After M1 — show price layer selection
      if (mod.id === 'M1') {
        setCurMod(null); setCurNiche(''); setCurStep(''); setCurStepIdx(0);
        setShowLayers(true);
        await generatePriceLayers(cleanedContent);
        return; // stop — wait for user layer selection
      }
    }
    setCurMod(null); setCurNiche(''); setCurStep(''); setCurStepIdx(0);
  }, [brief, lang, mods, proj, sv, priceLayers, selectedLayers, generatePriceLayers]);

  const continueAfterLayers = React.useCallback(() => {
    setShowLayers(false);
    // Add selected layer info to brief context
    const layerNames = selectedLayers.map(i => priceLayers[i]?.name).filter(Boolean);
    const newBrief = layerNames.length > 0 ? {...brief, priceLayer: layerNames.join(', ')} : brief;
    if (layerNames.length > 0) setBrief(newBrief);
    // Run remaining modules
    const doneIds = (proj?.results||[]).map(r=>r.id);
    const remaining = mods.filter(id => !doneIds.includes(id));
    if (remaining.length > 0) run(remaining, newBrief);
  }, [selectedLayers, priceLayers, brief, proj, mods, run]);

  const continueAfterNiche = React.useCallback(() => {
    const names = selNiches.map(i => nicheOpts[i]?.name).filter(Boolean);
    if (!names.length) return;
    setShowNiches(false);
    const newBrief = {...brief, selectedNiche: names.join(', ')};
    setBrief(newBrief);
    // Прогоняем все выбранные модули: run() сам пропустит уже готовые пары (модуль, ниша)
    // и досчитает только недостающие — так «добавить нишу позже» не пересчитывает старое.
    run(mods, newBrief);
  }, [nicheOpts, selNiches, brief, mods, run]);

  // Повторно открыть выбор ниш (кнопка «Добавить ниши»): восстанавливаем список ниш
  // из результата M1.2 и отмечаем уже исследованные.
  const openNichePicker = React.useCallback(() => {
    const m12 = (proj?.results||[]).find(r=>r.id==='M1_2');
    const nn = (m12 && m12.nicheData && Array.isArray(m12.nicheData.niches) ? m12.nicheData.niches : []).slice().sort((a,b)=>(b.score||0)-(a.score||0));
    if (!nn.length) return;
    setNicheOpts(nn);
    const cur = nichesOf(brief);
    setSelNiches(nn.map((n,i)=> cur.includes(n.name) ? i : -1).filter(i=>i>=0));
    setShowNiches(true);
  }, [proj, brief]);

  const genRep = React.useCallback(async () => {
    if (!proj?.results?.length) return;
    setRepping(true); setRepOpen(true); setRep(''); setXled('');
    try {
      const r = await callGPT(
        'Write a professional research report. ALL output in '+lang+' only. No fabricated data.',
        buildReportPrompt(brief, proj.results, lang)
      );
      setRep(r);
      const upd = {...proj, report:r, updatedAt:new Date().toISOString()};
      setProj(upd); sv(upd);
    } catch(e) { setRep('Error: '+e.message); }
    setRepping(false);
  }, [lang, brief, proj, sv]);

  const doXl = React.useCallback(async () => {
    if (!rep||!xl.trim()) return;
    setXlating(true); setXled('');
    try {
      const r = await callGPT('Translate accurately. Preserve all Markdown formatting.', 'Translate to '+xl+':\n\n'+rep);
      setXled(r);
    } catch(e) { setXled('Error: '+e.message); }
    setXlating(false);
  }, [rep, xl]);

  // Полный отчёт в Markdown: шапка + резюме (если есть) + ВСЕ модули целиком, без обрезки
  const buildFullMd = () => {
    const head = '# '+(brief.name||'CA Research')+'\n\n'
      + [brief.geoMarket?('Рынок: '+brief.geoMarket):null,
         'Язык исследования: '+lang,
         brief.selectedNiche?('Выбранные ниши: '+brief.selectedNiche):null,
         'Дата: '+new Date().toISOString().slice(0,10)]
        .filter(Boolean).join(' · ')+'\n\n';
    const summary = rep ? '## Executive Summary\n\n'+rep+'\n\n---\n\n' : '';
    const body = (proj?.results||[]).map(r=>{
      const m = MODULES.find(x=>x.id===r.id);
      const title = m ? (m.label||m.id)+' — '+(uiLang==='ru'?(m.titleRu||m.title):m.title) : r.id;
      return '## '+title+'\n\n'+r.content;
    }).join('\n\n---\n\n');
    return head + summary + body;
  };

  const dlMd = (content, suf='') => {
    const a = document.createElement('a');
    // \u0411\u0435\u0437 BOM: BOM (\uFEFF) \u043F\u0440\u0438 \u0447\u0442\u0435\u043D\u0438\u0438 \u0444\u0430\u0439\u043B\u0430 \u043A\u0430\u043A Latin-1/cp1252 \u0434\u0430\u0451\u0442 \u00AB\u00EF\u00BB\u00BF\u00BB \u0432 \u043D\u0430\u0447\u0430\u043B\u0435 \u0438
    // \u043B\u043E\u043C\u0430\u0435\u0442 markdown-\u043F\u0430\u0440\u0441\u0435\u0440\u044B. \u0427\u0438\u0441\u0442\u044B\u0439 UTF-8 \u2014 \u043A\u0430\u043A \u043F\u0440\u043E\u0441\u0438\u043B \u043F\u043E\u0442\u0440\u0435\u0431\u0438\u0442\u0435\u043B\u044C (strict UTF-8).
    a.href = URL.createObjectURL(new Blob([content],{type:'text/markdown;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+suf+'.md';
    a.click();
  };
  const dlCsv = () => {
    if (!proj?.results) return;
    const csv = [['Module','Content'],...proj.results.map(r=>[r.id,'"'+r.content.replace(/"/g,'""')+'"'])].map(r=>r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+'.csv';
    a.click();
  };
  const dlJson = () => {
    if (!proj?.results) return;
    // Было: сырой markdown, обрезанный по 3000 символов, поле segments читало
    // отключённый M1 (всегда пусто), персон в выгрузке не было вообще.
    const pkg = buildAgentPackage(brief, lang, proj.results, rep);
    pkg.price_layers = { available: priceLayers || [], selected: selectedLayers || [] };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(pkg,null,2)],{type:'application/json;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+'_agent_package.json';
    a.click();
  };

  // ── HEADER
  const Header = () => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
      <div>
        <h2 style={{fontSize:22,fontWeight:500}}>{t.appTitle}</h2>
        <p style={{fontSize:13,color:'#666',marginTop:3}}>{t.appSub} · {MODEL}</p>
      </div>
      <button onClick={switchUiLang} style={{padding:'5px 12px',fontSize:12,fontWeight:500}}>{uiLang==='en'?'RU':'EN'}</button>
    </div>
  );

  // ── ACCESS GATE (все хуки уже объявлены выше — условные возвраты безопасны)
  if (unlocked === null) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',color:'#999',fontSize:13}}>…</div>
  );
  if (unlocked === false) return <LockScreen t={t} onUnlock={()=>setUnlocked(true)} />;

  // ── LIST
  if (sc === 'list') return (
    <div>
      <Header/>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:'1rem'}}>
        <button className="btn-primary" onClick={goNew} style={{padding:'9px 18px'}}>{t.newProject}</button>
      </div>
      {projs.length === 0 && (
        <div className="card" style={{textAlign:'center',padding:'3rem'}}>
          <p style={{fontSize:15,color:'#666',marginBottom:8}}>{t.noProjects}</p>
          <p style={{fontSize:13,color:'#999',marginBottom:'1.5rem'}}>{t.noProjectsSub}</p>
          <button className="btn-primary" onClick={goNew} style={{padding:'10px 24px'}}>{t.newProject}</button>
        </div>
      )}
      {projs.map(p => {
        const done = (p.results||[]).map(r=>r.id);
        return (
          <div key={p.id} className="card" onClick={()=>openP(p)} style={{cursor:'pointer',marginBottom:10}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:500,marginBottom:3}}>{p.brief?.name||'Untitled'}</p>
                <p style={{fontSize:12,color:'#666',marginBottom:8}}>{[p.brief?.geoMarket||p.brief?.geo,p.brief?.niche,p.lang].filter(Boolean).join(' · ')}</p>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {(p.mods||[]).map(mid => {
                    const m=MODULES.find(x=>x.id===mid); const d=done.includes(mid);
                    return m ? <span key={mid} className="tag" style={{background:d?m.color:'#f5f5f5',color:d?'#fff':'#666',borderColor:d?m.color:'#ddd'}}>{mid}{d?' ✓':''}</span> : null;
                  })}
                  {p.report && <span className="tag" style={{background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>Report ✓</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <p style={{fontSize:11,color:'#888',marginBottom:2}}>{done.length}/{(p.mods||[]).length} modules</p>
                <p style={{fontSize:10,color:'#aaa',marginBottom:8}}>{new Date(p.updatedAt||p.createdAt).toLocaleDateString()}</p>
                <button onClick={e=>{e.stopPropagation();saveAll(loadAll().filter(x=>x.id!==p.id));ref();}} style={{padding:'2px 8px',fontSize:10,color:'#e44',borderColor:'#e44'}}>delete</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── FORM
  if (sc === 'form') return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'1.5rem'}}>
        <button onClick={()=>proj ? setSc('work') : setSc('list')}>{proj ? '← Back to project' : t.backBtn}</button>
        <h2 style={{fontSize:20,fontWeight:500}}>{proj ? 'Edit brief: '+brief.name : 'New project'}</h2>
        <div style={{marginLeft:'auto'}}>
          <button onClick={switchUiLang} style={{padding:'5px 12px',fontSize:12,fontWeight:500}}>{uiLang==='en'?'RU':'EN'}</button>
        </div>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>{t.autoFill}</p>
        <p style={{fontSize:12,color:'#666',marginBottom:10}}>{t.autoFillSub}</p>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input value={siteUrl} onChange={e=>setSiteUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&parseSite()} placeholder="https://client-site.com" style={{flex:1}}/>
          <button onClick={parseSite} disabled={!siteUrl.trim()||parsing} style={{whiteSpace:'nowrap',flexShrink:0,padding:'0 16px'}}>
            {parsing ? t.reading : t.readSite}
          </button>
        </div>
        {pMsg && <p style={{fontSize:12,color:pMsg.startsWith('✓')?'#27500A':pMsg.startsWith('✗')?'#c00':'#666'}}>{pMsg}</p>}
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <p style={{fontSize:13,fontWeight:500}}>{t.briefTitle}</p>
          <span className="tag" style={{background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>fill in any language</span>
        </div>
        <div style={{display:'grid',gap:2}}>
          <Field label={t.fName}><input value={brief.name} onChange={e=>setBrief(p=>({...p,name:e.target.value}))} placeholder={t.fNamePh}/></Field>
          <Field label={t.fNiche} info={t.fNicheInfo}><input value={brief.niche} onChange={e=>setBrief(p=>({...p,niche:e.target.value}))} placeholder={t.fNichePh}/></Field>
          <Field label={t.fGeoComp} info={t.fGeoCompInfo}><input value={brief.geoCompany} onChange={e=>setBrief(p=>({...p,geoCompany:e.target.value}))} placeholder={t.fGeoCompPh}/></Field>
          <Field label={t.fGeoMarket} info={t.fGeoMarketInfo}><input value={brief.geoMarket} onChange={e=>setBrief(p=>({...p,geoMarket:e.target.value}))} placeholder={t.fGeoMarketPh} style={{borderColor:'#378ADD'}}/></Field>
          <Field label={t.fFormat}><input value={brief.format} onChange={e=>setBrief(p=>({...p,format:e.target.value}))} placeholder={t.fFormatPh}/></Field>
          <Field label={t.fAudience}><input value={brief.audience} onChange={e=>setBrief(p=>({...p,audience:e.target.value}))} placeholder={t.fAudiencePh}/></Field>
          <Field label={t.fResult}><input value={brief.result} onChange={e=>setBrief(p=>({...p,result:e.target.value}))} placeholder={t.fResultPh}/></Field>
          <Field label={t.fPrice}><input value={brief.price} onChange={e=>setBrief(p=>({...p,price:e.target.value}))} placeholder={t.fPricePh}/></Field>
          <Field label={t.fCompetitors}><input value={brief.competitors} onChange={e=>setBrief(p=>({...p,competitors:e.target.value}))} placeholder={t.fCompetitorsPh}/></Field>
          <Field label={t.fExtra}><textarea value={brief.extra} onChange={e=>setBrief(p=>({...p,extra:e.target.value}))} placeholder={t.fExtraPh} rows={2} style={{resize:'vertical'}}/></Field>
        </div>

        {(brief.services||[]).length > 0 && (
          <React.Fragment>
            <div style={{borderTop:'1px solid #eee',margin:'1rem 0'}}/>
            <p style={{fontSize:12,fontWeight:500,color:'#666',marginBottom:4}}>{t.servicesTitle} <span style={{fontSize:11,fontWeight:400,color:'#aaa'}}>— {t.servicesSub}</span></p>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:4}}>
              {(brief.services||[]).map((s,i) => {
                const on = (brief.selectedServices||[]).includes(s);
                return (
                  <button key={i} type="button"
                    onClick={()=>setBrief(p=>({...p, selectedServices: on ? (p.selectedServices||[]).filter(x=>x!==s) : [...(p.selectedServices||[]), s]}))}
                    style={{padding:'5px 12px',fontSize:12,borderRadius:14,border:'1px solid '+(on?'#378ADD':'#ddd'),background:on?'#E6F1FB':'#fff',color:on?'#0C447C':'#555',fontWeight:on?500:400,cursor:'pointer'}}>
                    {on ? '✓ ' : ''}{s}
                  </button>
                );
              })}
            </div>
            <p style={{fontSize:11,color:'#aaa'}}>{t.servicesHint}</p>
          </React.Fragment>
        )}

        <Field label={t.fNicheCandidates} optional info={t.fNicheCandidatesInfo}>
          <input value={brief.nicheCandidates} onChange={e=>setBrief(p=>({...p,nicheCandidates:e.target.value}))} placeholder={t.fNicheCandidatesPh}/>
        </Field>

        <div style={{borderTop:'1px solid #eee',margin:'1rem 0'}}/>
        <p style={{fontSize:12,fontWeight:500,color:'#666',marginBottom:8}}>{t.companyDataTitle} <span style={{fontSize:11,fontWeight:400,color:'#aaa'}}>— {t.companyDataSub}</span></p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
          <Field label={t.fRevenue} optional info={t.fRevenueInfo}><input value={brief.currentRevenue} onChange={e=>setBrief(p=>({...p,currentRevenue:e.target.value}))} placeholder={t.fRevenuePh}/></Field>
          <Field label={t.fClients} optional info={t.fClientsInfo}><input value={brief.currentClients} onChange={e=>setBrief(p=>({...p,currentClients:e.target.value}))} placeholder={t.fClientsPh}/></Field>
          <Field label={t.fAvgCheck} optional info={t.fAvgCheckInfo}><input value={brief.currentAvgCheck} onChange={e=>setBrief(p=>({...p,currentAvgCheck:e.target.value}))} placeholder={t.fAvgCheckPh}/></Field>
        </div>

        <div style={{borderTop:'1px solid #eee',margin:'1rem 0'}}/>
        <p style={{fontSize:12,fontWeight:500,color:'#666',marginBottom:8}}>{t.skipM1Title} <span style={{fontSize:11,fontWeight:400,color:'#aaa'}}>— {t.skipM1Sub}</span></p>
        <Field label={t.fTargetSegment} optional info={t.fTargetSegmentInfo}><input value={brief.targetSegment} onChange={e=>setBrief(p=>({...p,targetSegment:e.target.value}))} placeholder={t.fTargetSegmentPh}/></Field>
        <Field label={t.fPriceLayer} optional info={t.fPriceLayerInfo}>
          <select value={brief.priceLayer} onChange={e=>setBrief(p=>({...p,priceLayer:e.target.value}))}>
            <option value="">— select if known —</option>
            <option value="economy">{t.fPriceLayerEco}</option>
            <option value="midmarket">{t.fPriceLayerMid}</option>
            <option value="premium">{t.fPriceLayerPrem}</option>
          </select>
        </Field>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>{t.researchLang}</p>
        <p style={{fontSize:12,color:'#666',marginBottom:10}}>{t.researchLangSub}</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          {LANGS.map(l => (
            <button key={l} onClick={()=>setLang(l)} style={{padding:'5px 12px',fontSize:12,borderColor:l===lang?'#378ADD':'#ddd',background:l===lang?'#E6F1FB':'#fff',color:l===lang?'#0C447C':'#111',fontWeight:l===lang?500:400}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>{t.selectModules}</p>
        <p style={{fontSize:12,color:'#666',marginBottom:10}}>{t.selectModulesSub}</p>
        {MODULES.map(m => (
          <ModuleCard key={m.id} m={m} on={mods.includes(m.id)} onToggle={()=>setMods(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id])} uiLang={uiLang}/>
        ))}
      </div>

      <div className="card" style={{background:'#fffbf0',borderColor:'#f5d89e'}}>
        <p style={{fontSize:12,color:'#7a5f00'}}>
          <strong>{t.modelLabel}:</strong> {MODEL} &nbsp;·&nbsp;
          <strong>{t.dataPolicy}:</strong> {t.dataPolicyVal} &nbsp;·&nbsp;
          <strong>{t.estTime}:</strong> ~{mods.reduce((s,id)=>s+(MODULES.find(m=>m.id===id)?.estimatedMin||8),0)} min
        </p>
      </div>

      {proj ? (
        <button className="btn-primary" onClick={()=>{saveBriefToProject();setSc('work');}}
          style={{width:'100%',padding:'13px',fontSize:14}}>
          Save & back to project →
        </button>
      ) : (
        <React.Fragment>
          {blockMsg && (
            <p style={{fontSize:12,color:'#c00',marginBottom:8,lineHeight:1.5}}>⚠ {blockMsg}</p>
          )}
          <button className="btn-primary" onClick={()=>run()} disabled={!brief.name||!mods.length}
            style={{width:'100%',padding:'13px',fontSize:14,opacity:brief.name&&mods.length?1:0.4}}>
            {t.startBtn} {lang} → {mods.length} module{mods.length!==1?'s':''} · {MODEL}
          </button>
        </React.Fragment>
      )}
    </div>
  );

  // ── WORK
  const allMods = MODULES.filter(m => mods.includes(m.id));
  const workNiches = nichesOf(brief);
  // Модуль «полностью готов»: глобальный — если есть его результат; по-нишевой — если сделан у ВСЕХ выбранных ниш.
  const modDone = id => {
    const rs = (proj?.results||[]);
    if (isPerNiche(id)) return workNiches.length>0 && workNiches.every(n => rs.some(r=>r.id===id && (r.niche||'')===n));
    return rs.some(r=>r.id===id);
  };
  const doneCount = allMods.filter(m => modDone(m.id)).length;
  const pending = allMods.filter(m => !modDone(m.id) && m.id !== curMod);
  const isRun = !!curMod;
  const curModData = MODULES.find(m=>m.id===curMod);
  // Порядок вывода: глобальные модули сверху, затем ниша за нишей (внутри — по порядку модулей).
  const orderedResults = [...(proj?.results||[])].sort((a,b)=>{
    const ga=!(a.niche), gb=!(b.niche);
    if (ga!==gb) return ga?-1:1;
    if ((a.niche||'')!==(b.niche||'')) {
      const ia=workNiches.indexOf(a.niche||''), ib=workNiches.indexOf(b.niche||'');
      return (ia<0?99:ia)-(ib<0?99:ib);
    }
    return MODULES.findIndex(x=>x.id===a.id)-MODULES.findIndex(x=>x.id===b.id);
  });

  return (
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1rem'}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <button onClick={()=>setSc('list')}>{t.backProjects}</button>
            <h2 style={{fontSize:18,fontWeight:500}}>{brief.name}</h2>
          </div>
          <p style={{fontSize:12,color:'#666'}}>
            {[brief.geoMarket||brief.geo,brief.niche].filter(Boolean).join(' · ')}
            <span className="tag" style={{marginLeft:8,background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>{lang}</span>
            <span className="tag" style={{marginLeft:4,background:'#f0f0f0',color:'#444',borderColor:'#ddd'}}>{MODEL}</span>
            {brief.priceLayer && <span className="tag" style={{marginLeft:4,background:'#FAEEDA',color:'#633806',borderColor:'#EF9F27'}}>{brief.priceLayer}</span>}
          </p>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0,flexWrap:'wrap'}}>
          {!isRun && pending.length > 0 && (
            <button className="btn-primary" onClick={()=>run()}>
              ▶ Run: {pending.map(m=>m.id).join(', ')} ↗
            </button>
          )}
          {!isRun && pending.length === 0 && doneCount > 0 && (
            <button className="btn-primary" onClick={()=>setSc('form')} style={{background:'#378ADD',borderColor:'#378ADD'}}>
              + Add modules ↗
            </button>
          )}
          {!isRun && modDone('M1_2') && (
            <button onClick={openNichePicker} style={{fontSize:12,padding:'7px 12px',color:'#2E4F0C',borderColor:'#A8CE6E',background:'#EFF6E4',fontWeight:500}}
              title="Добавить ещё ниши к исследованию — прогонятся только новые, готовые не тронутся">
              ＋ Добавить ниши
            </button>
          )}
          <button onClick={()=>setSc('form')} style={{fontSize:12,padding:'7px 12px',color:'#666',borderColor:'#ddd'}}>
            Edit brief ✎
          </button>
        </div>
      </div>

      <div style={{marginBottom:'1.25rem'}}>
        <div style={{display:'flex',gap:3,marginBottom:5}}>
          {allMods.map(m => {
            const d=modDone(m.id), a=curMod===m.id;
            return <div key={m.id} title={m.title} style={{flex:1,height:4,borderRadius:2,background:d?m.color:a?m.color+'99':'#e0e0e0'}}/>;
          })}
        </div>
        <p style={{fontSize:11,color:'#888'}}>
          {isRun ? (curModData ? curModData.title : '')+(curNiche?' · ниша: '+curNiche:'') : doneCount+'/'+allMods.length+' modules done'+(pending.length?' · '+pending.length+' '+t.pending:'')+(workNiches.length?' · '+workNiches.length+' ниш(и)':'')}
        </p>
      </div>

      {isRun && curModData && (
        <div className="status-bar">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:'#aaa',marginBottom:4}}>{curModData.id} · {curModData.title}{curNiche?' · ниша: '+curNiche:''}</p>
              <p style={{fontSize:14,fontWeight:500,marginBottom:10}}>{curStep}</p>
              <div style={{display:'flex',gap:4}}>
                {curModData.steps.map((_,i)=>(
                  <div key={i} style={{flex:1,height:2,borderRadius:1,background:i<=curStepIdx?curModData.color:'#333'}}/>
                ))}
              </div>
              <p style={{fontSize:10,color:'#666',marginTop:4}}>{curStepIdx+1} / {curModData.steps.length} steps</p>
            </div>
            <CountdownTimer totalSeconds={curModData.estimatedMin*60} label="Est. remaining"/>
          </div>
        </div>
      )}

      {orderedResults.map((r,i,arr) => {
        const m = MODULES.find(x=>x.id===r.id); if (!m) return null;
        const open = exp[resKey(r)];
        const showNicheHeader = r.niche && (i===0 || (arr[i-1].niche||'') !== r.niche);
        return (
          <React.Fragment key={resKey(r)}>
            {showNicheHeader && (
              <div style={{display:'flex',alignItems:'center',gap:8,margin:'18px 0 8px'}}>
                <span style={{fontSize:11,fontWeight:700,color:'#2E4F0C',textTransform:'uppercase',letterSpacing:'0.05em',background:'#EFF6E4',border:'1px solid #A8CE6E',borderRadius:6,padding:'3px 10px'}}>Ниша: {r.niche}</span>
                <div style={{flex:1,height:1,background:'#e5e5e5'}}/>
              </div>
            )}
            <div style={{marginBottom:8,border:'1px solid '+m.border,borderRadius:12,overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',background:m.bg}}>
                <div onClick={()=>setExp(e=>({...e,[resKey(r)]:!e[resKey(r)]}))} style={{display:'flex',alignItems:'center',gap:9,padding:'11px 14px',cursor:'pointer',flex:1}}>
                  <span className="tag" style={{background:m.color,color:'#fff',borderColor:m.color}}>{m.id}</span>
                  <span style={{flex:1,fontSize:13,fontWeight:500,color:m.dark}}>{m.title}</span>
                  {r.usage && <span style={{fontSize:10,color:'#aaa',marginRight:8}} title={'запрос '+r.usage.prompt.toLocaleString('ru-RU')+' + ответ '+r.usage.completion.toLocaleString('ru-RU')+' токенов'}>≈{(r.usage.total/1000).toFixed(1)}k т.</span>}
                  <span style={{fontSize:10,color:'#888',marginRight:4}}>{r.at?new Date(r.at).toLocaleDateString():''}</span>
                  <span style={{fontSize:12,color:m.color}}>{open?'▲':'▼'}</span>
                </div>
                {!isRun && (
                  <div style={{display:'flex',gap:5,margin:'0 8px',flexShrink:0}}>
                    <button onClick={e=>{
                        e.stopPropagation();
                        // Перегенерация: чистим этот модуль и все зависимые ниже по цепочке,
                        // затем перезапускаем их с реальным поиском (не из старого результата).
                        // ГЛОБАЛЬНЫЙ модуль (M1.1/M1.2) — цепочка ТОЛЬКО из него самого: у него
                        // нет своей ниши, и раньше order.slice(idx) от него включал M2–M7, а
                        // run() внутри (rerunNiche falsy → работает по ВСЕМ выбранным нишам сразу)
                        // тихо стирал и пересчитывал уже готовые M2–M7 всех выбранных ниш —
                        // ↺ на карте ниш неожиданно жёг лимит на весь пройденный прогон.
                        const order = MODULES.filter(x=>!x.disabled).map(x=>x.id);
                        const idx = order.indexOf(r.id);
                        const chain = isPerNiche(r.id) ? (idx>=0 ? order.slice(idx) : [r.id]) : [r.id];
                        const rn = r.niche||'';
                        // чистим цепочку только для ЭТОЙ ниши (у по-нишевых), глобальные — как есть
                        const upd={...proj,results:(proj.results||[]).filter(x=> !(chain.includes(x.id) && (isPerNiche(x.id) ? (x.niche||'')===rn : true))),updatedAt:new Date().toISOString()};
                        setProj(upd);sv(upd);
                        run(chain, undefined, true, rn||undefined);
                      }}
                      style={{padding:'3px 8px',fontSize:10,color:m.dark,borderColor:m.border,background:'rgba(255,255,255,0.7)'}}
                      title="Перегенерировать: новый поиск для этого модуля и зависимых ниже">
                      ↺
                    </button>
                    <button onClick={e=>{e.stopPropagation();const html=generateHTMLReport(brief,proj.results,lang,priceLayers,selectedLayers,r.id);const w=window.open('','_blank');w.document.write(html);w.document.close();}}
                      style={{padding:'3px 8px',fontSize:10,color:m.dark,borderColor:m.border,background:'rgba(255,255,255,0.7)'}}
                      title="Download this module report">
                      ↓ PDF
                    </button>
                  </div>
                )}
              </div>
              {open && (
                <div style={{padding:'14px 16px',background:'#fff',borderTop:'1px solid '+m.border}}>
                  <ModuleCharts moduleId={r.id} chartData={r.chartData}/>
                  {r.id === 'M1' && r.chartData && (
                    <MarketPositionBlock chartData={r.chartData} brief={brief} lang={lang}/>
                  )}
                  <MD text={r.content}/>
                </div>
              )}
            </div>
            {r.id === 'M1_2' && !isRun && showNiches && nicheOpts.length > 0 && (
              <div style={{marginBottom:16}}>
                <div className="card">
                  <h3 style={{fontSize:16,fontWeight:500,marginBottom:6}}>{t.nichePickTitle}</h3>
                  <p style={{fontSize:13,color:'#666',marginBottom:14,lineHeight:1.5}}>{t.nichePickSub}</p>
                  <NicheScoreChart niches={nicheOpts}/>
                  <div style={{maxHeight:nicheOpts.length>10?520:'none',overflowY:nicheOpts.length>10?'auto':'visible',paddingRight:nicheOpts.length>10?4:0}}>
                  {nicheOpts.map((n, i) => {
                    const isOn = selNiches.includes(i);
                    const c = '#4A7C1F', bg = '#EFF6E4', dark = '#2E4F0C';
                    return (
                      <div key={i} onClick={()=>setSelNiches(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])}
                        style={{border:isOn?'2px solid '+c:'1px solid #e5e5e5',borderRadius:12,padding:'1rem 1.25rem',marginBottom:8,cursor:'pointer',background:isOn?bg:'#fff'}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                          <div style={{flex:1,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:14,fontWeight:500,color:isOn?dark:'#111'}}>{n.name}</span>
                            {n.recommended && <span style={{fontSize:10,fontWeight:600,padding:'2px 8px',borderRadius:10,background:isOn?'rgba(255,255,255,0.7)':'#EAF3DE',color:'#27500A'}}>★ {t.nicheRecommended}</span>}
                            <span style={{fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4,background:n.verdict==='Go'?'#EAF3DE':n.verdict==='Maybe'?'#FAEEDA':'#FAECE7',color:n.verdict==='Go'?'#27500A':n.verdict==='Maybe'?'#633806':'#712B13'}}>{n.verdict}</span>
                          </div>
                          <div style={{width:18,height:18,borderRadius:'50%',border:isOn?'none':'1.5px solid #ccc',background:isOn?c:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            {isOn && <span style={{color:'#fff',fontSize:11}}>✓</span>}
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8,marginBottom:n.why?8:0}}>
                          {[[t.nicheDemand,n.demand],[t.nicheCompetition,n.competition],[t.nicheEconomics,n.economics],[t.nicheScore,n.score]].map(([l,v])=>(
                            <div key={l} style={{background:isOn?'rgba(255,255,255,0.6)':'#f8f8f8',borderRadius:8,padding:'8px 10px'}}>
                              <div style={{fontSize:10,color:isOn?dark:'#999',marginBottom:2}}>{l}</div>
                              <div style={{fontSize:13,fontWeight:500,color:isOn?dark:'#444'}}>{v ?? '—'}</div>
                            </div>
                          ))}
                        </div>
                        {n.why && <p style={{fontSize:12,color:isOn?dark:'#777',lineHeight:1.5,margin:0}}>{n.why}</p>}
                      </div>
                    );
                  })}
                  </div>
                  <div style={{display:'flex',gap:10,marginTop:12}}>
                    <button className="btn-primary" onClick={continueAfterNiche} disabled={selNiches.length===0}>{t.nicheContinue}</button>
                  </div>
                </div>
              </div>
            )}
            {r.id === 'M1' && !isRun && showLayers && (
              <div style={{marginBottom:16}}>
                <div className="card">
                  <h3 style={{fontSize:16,fontWeight:500,marginBottom:6}}>{t.chooseLayer}</h3>
                  <p style={{fontSize:13,color:'#666',marginBottom:14,lineHeight:1.5}}>{t.chooseLayerSub}</p>
                  {generatingLayers ? (
                    <p style={{fontSize:13,color:'#888',padding:'1rem 0'}}>{t.generating2}</p>
                  ) : priceLayers.map((layer, i) => {
                    const isOn = selectedLayers.includes(i);
                    const colors = ['#1565A8','#639922','#633806'];
                    const bgs = ['#E3EFFE','#EAF3DE','#FAEEDA'];
                    const darks = ['#0D3E6E','#27500A','#412402'];
                    return (
                      <div key={i} onClick={()=>setSelectedLayers(s=>s.includes(i)?s.filter(x=>x!==i):[...s,i])}
                        style={{border:isOn?'2px solid '+colors[i]:'1px solid #e5e5e5',borderRadius:12,padding:'1rem 1.25rem',marginBottom:8,cursor:'pointer',background:isOn?bgs[i]:'#fff'}}>
                        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:14,fontWeight:500,color:isOn?darks[i]:'#111'}}>{layer.name}</div>
                            <div style={{fontSize:12,color:isOn?colors[i]:'#888',marginTop:2}}>{layer.priceRange}</div>
                          </div>
                          <div style={{width:18,height:18,borderRadius:'50%',border:isOn?'none':'1.5px solid #ccc',background:isOn?colors[i]:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            {isOn && <span style={{color:'#fff',fontSize:11}}>✓</span>}
                          </div>
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:layer.players&&layer.players.length>0?10:0}}>
                          {[['Clients / SOM',layer.som],['Competition',layer.competition],['AOV/CAC efficiency',layer.efficiency]].map(([l,v])=>(
                            <div key={l} style={{background:isOn?'rgba(255,255,255,0.6)':'#f8f8f8',borderRadius:8,padding:'8px 10px'}}>
                              <div style={{fontSize:10,color:isOn?darks[i]:'#999',marginBottom:2}}>{l}</div>
                              <div style={{fontSize:13,fontWeight:500,color:isOn?darks[i]:'#444'}}>{v||'—'}</div>
                            </div>
                          ))}
                        </div>
                        {layer.players && layer.players.length > 0 && (
                          <div>
                            <div style={{fontSize:10,color:isOn?darks[i]:'#999',marginBottom:4}}>Key players in this layer</div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                              {layer.players.map((p,j)=><span key={j} style={{fontSize:11,padding:'2px 8px',borderRadius:3,background:isOn?'rgba(255,255,255,0.7)':'#f0f0f0',color:isOn?darks[i]:'#555'}}>{p}</span>)}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <p style={{fontSize:12,color:'#888',marginTop:4,marginBottom:14}}>{t.layerNote}</p>
                  <div style={{display:'flex',gap:10}}>
                    <button className="btn-primary" onClick={continueAfterLayers} disabled={selectedLayers.length===0}>{t.continueToM2}</button>
                    <button onClick={()=>setShowLayers(false)}>{t.backToM1}</button>
                  </div>
                </div>
              </div>
            )}
          </React.Fragment>
        );
      })}

      {!isRun && (
        <div style={{marginTop:16}}>
          <div style={{border:'1px solid #e5e5e5',borderRadius:12,overflow:'hidden',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'#f8f8f8',borderBottom:'1px solid #e5e5e5'}}>
              <span style={{flex:1,fontSize:14,fontWeight:500}}>Report <span style={{fontSize:11,fontWeight:400,color:'#888'}}>in {lang}</span></span>
              {!rep&&!repping&&<button className="btn-primary" onClick={genRep}>{t.generateReport}</button>}
              {rep&&!repping&&<button onClick={genRep}>{t.regenerate}</button>}
              {(rep||repping)&&<button onClick={()=>setRepOpen(o=>!o)}>{repOpen?t.collapse:t.expand}</button>}
            </div>
            {repping && <p style={{padding:'14px',fontSize:13,color:'#888'}}>{t.generating} (~2–3 min)</p>}
            {rep && repOpen && (
              <>
                <div style={{padding:'14px',maxHeight:600,overflowY:'auto'}}><MD text={rep}/></div>
                <div style={{padding:'10px 14px',borderTop:'1px solid #e5e5e5',background:'#f8f8f8',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:12,color:'#666',flexShrink:0}}>{t.translateTo}</span>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',flex:1}}>
                    {['Russian','English','Turkish','Arabic','German'].filter(l=>l!==lang).map(l=>(
                      <button key={l} onClick={()=>setXl(l)} style={{padding:'4px 10px',fontSize:11,borderColor:xl===l?'#378ADD':'#ddd',background:xl===l?'#E6F1FB':'#fff',color:xl===l?'#0C447C':'#111'}}>{l}</button>
                    ))}
                    <input value={xl} onChange={e=>setXl(e.target.value)} placeholder="other…" style={{width:90,fontSize:11,padding:'4px 8px'}}/>
                  </div>
                  <button className="btn-primary" onClick={doXl} disabled={!xl.trim()||xlating}>{xlating?t.translating:t.translate}</button>
                </div>
                {xled && (
                  <div style={{padding:'14px',borderTop:'1px solid #e5e5e5',maxHeight:400,overflowY:'auto'}}>
                    <p style={{fontSize:11,fontWeight:500,color:'#888',marginBottom:8}}>TRANSLATION — {xl}</p>
                    <MD text={xled}/>
                  </div>
                )}
              </>
            )}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
            <button onClick={()=>dlMd(buildFullMd(),'_full')} style={{fontWeight:500,borderColor:'#111'}}>{t.dlFullMd}</button>
            <button onClick={()=>rep&&dlMd(rep,'_summary')} disabled={!rep} style={{opacity:rep?1:0.4}}>{t.dlReport}</button>
            <button onClick={()=>{const html=generateHTMLReport(brief,proj.results,lang,priceLayers,selectedLayers,null);const w=window.open('','_blank');w.document.write(html);w.document.close();}} style={{background:'#111',color:'#fff',borderColor:'#111',fontWeight:500}}>↗ Полный отчёт</button>
            <button onClick={()=>xled&&dlMd(xled,'_translated')} disabled={!xled} style={{opacity:xled?1:0.4}}>{t.dlTranslation}</button>
            <button onClick={dlCsv}>{t.dlData}</button>
            <button onClick={dlJson} style={{borderColor:'#EF9F27',color:'#633806'}}>{t.dlAgent}</button>
          </div>
          <p style={{fontSize:11,color:'#888',textAlign:'center',marginTop:8}}>{t.autoSaved}</p>
          {(()=>{const tot=(proj.results||[]).reduce((s,r)=>s+(r.usage?r.usage.total:0),0);return tot>0?(<p style={{fontSize:11,color:'#888',textAlign:'center',marginTop:2}}>Токенов OpenAI за прогон: ≈{(tot/1000).toFixed(1)}k <span style={{color:'#bbb'}}>(сумма по модулям с замером; поиск Tavily считается отдельно)</span></p>):null;})()}
        </div>
      )}
    </div>
  );
}

// Ловец ошибок: вместо белого экрана показывает текст сбоя (для диагностики)
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = {err:null}; }
  static getDerivedStateFromError(e){ return {err:e}; }
  render(){
    if (this.state.err) {
      const msg = String((this.state.err && (this.state.err.message||this.state.err)) || 'Unknown error');
      const stack = String((this.state.err && this.state.err.stack) || '').slice(0, 800);
      return (
        <div style={{maxWidth:680,margin:'40px auto',padding:'20px 24px',border:'1px solid #f0b4b4',background:'#fdf2f2',borderRadius:12}}>
          <div style={{fontWeight:600,color:'#a33',marginBottom:8,fontSize:15}}>⚠ Ошибка интерфейса — пришлите этот текст разработчику</div>
          <div style={{fontSize:12,color:'#a33',whiteSpace:'pre-wrap',fontFamily:'monospace'}}>{msg}{'\n\n'}{stack}</div>
          <button onClick={()=>location.reload()} style={{marginTop:14,padding:'8px 16px',cursor:'pointer'}}>Перезагрузить страницу</button>
        </div>
      );
    }
    return this.props.children;
  }
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary, null, React.createElement(App)));
</script>
</body>
