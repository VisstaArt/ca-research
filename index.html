async function callGPT(system, user) {
  const res = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 8000,
      stream: false,
      messages: [
        { role: 'system', content: system },
        { role: 'user',   content: user   },
      ],
    }),
  });
  if (!res.ok) throw new Error('API ' + res.status);
  const d = await res.json();
  if (d.error) throw new Error(d.error.message || 'API error');
  return d.choices?.[0]?.message?.content || '';
}

async function fetchSite(url) {
  const base = url.replace(/\/$/, '');
  const pages = [];
  const candidates = [base, base+'/hakkimizda', base+'/about', base+'/hizmetler',
    base+'/services', base+'/o-nas', base+'/uslugi', base+'/products', base+'/o-kompanii'];
  for (const u of candidates) {
    try {
      const r = await fetch(`${PROXY}?url=${encodeURIComponent(u)}`);
      if (!r.ok) continue;
      const t = await r.text();
      const clean = t.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
      if (clean.length > 300) { pages.push({ url: u, text: clean.slice(0, 2500) }); if (pages.length >= 3) break; }
    } catch {}
  }
  return pages;
}

// ── MARKDOWN ────────────────────────────────────────────────────────────────────
function MD({ text }) {
  if (!text) return null;
  const lines = text.split('\n');
  const out = []; let tbl = []; let k = 0;
  const ft = () => {
    if (tbl.length < 2) { tbl.forEach(l => out.push(<p key={k++} style={{margin:'2px 0',fontSize:12,color:'#666'}}>{l}</p>)); tbl=[]; return; }
    const hdrs = tbl[0].split('|').map(h=>h.trim()).filter(Boolean);
    const rows = tbl.slice(2).map(r=>r.split('|').map(c=>c.trim()).filter(Boolean));
    out.push(
      <div key={k++} style={{overflowX:'auto',margin:'10px 0'}}>
        <table>
          <thead><tr>{hdrs.map((h,i)=><th key={i}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((row,ri)=><tr key={ri}>{row.map((c,ci)=><td key={ci}>{c}</td>)}</tr>)}</tbody>
        </table>
      </div>
    );
    tbl=[];
  };
  for (const line of lines) {
    if (line.trim().startsWith('|')) { tbl.push(line); continue; }
    if (tbl.length) ft();
    if (line.startsWith('## ')) out.push(<h2 key={k++} style={{margin:'16px 0 5px',fontSize:15,fontWeight:500,borderBottom:'1px solid #eee',paddingBottom:3}}>{line.slice(3)}</h2>);
    else if (line.startsWith('### ')) out.push(<h3 key={k++} style={{margin:'12px 0 4px',fontSize:14,fontWeight:500}}>{line.slice(4)}</h3>);
    else if (line.startsWith('#### ')) out.push(<h4 key={k++} style={{margin:'10px 0 3px',fontSize:13,fontWeight:500}}>{line.slice(5)}</h4>);
    else if (line.startsWith('**') && line.endsWith('**') && line.length>4) out.push(<p key={k++} style={{margin:'10px 0 3px',fontSize:13,fontWeight:500}}>{line.slice(2,-2)}</p>);
    else if (/^[-•]\s/.test(line)) out.push(<p key={k++} style={{margin:'2px 0 2px 12px',fontSize:13}}>· {line.slice(2)}</p>);
    else if (!line.trim()) out.push(<div key={k++} style={{height:5}}/>);
    else {
      const parts = line.split(/\*\*(.*?)\*\*/);
      out.push(<p key={k++} style={{margin:'3px 0',fontSize:13,lineHeight:1.6}}>{parts.map((p,i)=>i%2===1?<strong key={i}>{p}</strong>:p)}</p>);
    }
  }
  if (tbl.length) ft();
  return React.createElement(React.Fragment, null, ...out);
}

// ── TIMER COMPONENT ─────────────────────────────────────────────────────────────
function CountdownTimer({ totalSeconds, label }) {
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    ref.current = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(ref.current);
  }, []);
  const remaining = Math.max(0, totalSeconds - elapsed);
  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');
  const pct = Math.min(100, (elapsed / totalSeconds) * 100);
  return (
    <div>
      <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>{label}</div>
      <div className="timer">{mm}:{ss}</div>
      <div style={{marginTop:8,height:3,background:'#333',borderRadius:2}}>
        <div style={{height:'100%',width:`${pct}%`,background:'#4ade80',borderRadius:2,transition:'width 1s linear'}}/>
      </div>
    </div>
  );
}

// ── CHART COMPONENTS ─────────────────────────────────────────────────────────────
function PieChart({ data, title }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !data?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d=>d.label),
        datasets: [{ data: data.map(d=>d.value), backgroundColor: data.map((d,i)=>d.color||['#639922','#0F6E56','#3C3489','#633806','#712B13','#72243E'][i%6]) }]
      },
      options: { plugins: { legend: { position: 'right' } }, responsive: true }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:10}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:8}}>{title}</p>
      <canvas ref={canvasRef} height={200}/>
    </div>
  );
}

function BarChart({ labels, values, title, color='#639922' }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !values?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels, datasets: [{ label: title, data: values, backgroundColor: color }] },
      options: { plugins: { legend: { display: false } }, responsive: true, scales: { y: { beginAtZero: true } } }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [labels, values]);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:10}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:8}}>{title}</p>
      <canvas ref={canvasRef} height={200}/>
    </div>
  );
}

function ScatterChart({ data, title }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !data?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const colors = { Go:'#639922', Hold:'#EF9F27', Stop:'#e44' };
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bubble',
      data: {
        datasets: data.map(d => ({
          label: d.name,
          data: [{ x: d.demand||0, y: d.competition||0, r: Math.max(6, (d.score||3)*3) }],
          backgroundColor: (colors[d.verdict]||'#888') + '99'
        }))
      },
      options: {
        responsive: true,
        scales: {
          x: { title: { display: true, text: 'Demand (1-5)' }, min: 0, max: 6 },
          y: { title: { display: true, text: 'Competition (1-5)' }, min: 0, max: 6 }
        }
      }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:10}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>{title}</p>
      <p style={{fontSize:11,color:'#888',marginBottom:8}}>Size = score. Green=Go, Orange=Hold, Red=Stop</p>
      <canvas ref={canvasRef} height={220}/>
    </div>
  );
}

function App() {
  const [sc, setSc] = useState('list');
  const [projs, setProjs] = useState(() => loadAll());
  const [proj, setProj] = useState(null);
  const empty = { name:'', niche:'', geoCompany:'', geoMarket:'', format:'', audience:'', result:'', price:'', competitors:'', extra:'' };
  const [brief, setBrief] = useState(empty);
  const [lang, setLang] = useState('Russian');
  const [mods, setMods] = useState(['M1','M2']);
  const [siteUrl, setSiteUrl] = useState('');
  const [parsing, setParsing] = useState(false);
  const [pMsg, setPMsg] = useState('');
  const [curMod, setCurMod] = useState(null);
  const [curStep, setCurStep] = useState('');
  const [curStepIdx, setCurStepIdx] = useState(0);
  const [exp, setExp] = useState({});
  const [rep, setRep] = useState('');
  const [repping, setRepping] = useState(false);
  const [repOpen, setRepOpen] = useState(false);
  const [xl, setXl] = useState('');
  const [xlating, setXlating] = useState(false);
  const [xled, setXled] = useState('');

  const ref = () => setProjs(loadAll());
  const sv = useCallback(p => { upsert(p); ref(); return p; }, []);

  // Site reading
  const parseSite = useCallback(async () => {
    if (!siteUrl.trim()) return;
    setParsing(true); setPMsg('⟳ Reading site pages…');
    try {
      const pages = await fetchSite(siteUrl.trim());
      if (!pages.length) throw new Error('No readable content found. Fill manually.');
      const combined = pages.map(p=>`[${p.url}]\n${p.text}`).join('\n\n---\n\n');
      setPMsg(`⟳ Read ${pages.length} page(s) — extracting brief…`);
      const result = await callGPT(
        'Extract a marketing brief from website content. Reply ONLY with valid JSON, no markdown.',
        `Extract from:\n\n${combined}\n\nReturn ONLY:\n{"name":"","niche":"","geoCompany":"","geoMarket":"","format":"","audience":"","result":"","price":"","competitors":"","extra":"","lang":"detected language e.g. Turkish"}`
      );
      const d = JSON.parse(result.replace(/```json|```/g,'').trim());
      setBrief(p => ({...p, ...Object.fromEntries(Object.entries(d).filter(([k,v])=>k!=='lang'&&v&&empty.hasOwnProperty(k)))}));
      if (d.lang) { const m=LANGS.find(l=>l.toLowerCase()===d.lang.toLowerCase()); if(m) setLang(m); }
      setPMsg(`✓ Brief filled from ${pages.length} page(s) — review below`);
    } catch(e) { setPMsg('✗ ' + e.message); }
    setParsing(false);
  }, [siteUrl]);

  const openP = p => {
    const b={...(p.brief||{})}; if(b.geo&&!b.geoMarket){b.geoMarket=b.geo;delete b.geo;}
    setProj(p); setBrief({...empty,...b}); setLang(p.lang||'Russian');
    setMods(p.mods||['M1','M2']); setRep(p.report||'');
    setExp({}); setRepOpen(false); setXled(''); setSc('work');
  };

  const goNew = () => {
    setProj(null); setBrief(empty); setLang('Russian'); setMods(['M1','M2']);
    setSiteUrl(''); setPMsg(''); setRep(''); setExp({}); setRepOpen(false); setXled('');
    setSc('form');
  };

  const getModulePrompt = (modId, brief, lang, prevContent) => {
    const p = prevContent ? prevContent.slice(0, 2000) : '';
    switch(modId) {
      case 'M1': return buildM1Prompt(brief, lang, p);
      case 'M2': return buildM2Prompt(brief, lang, p);
      case 'M3': return buildM3Prompt(brief, lang, p);
      case 'M4': return buildM4Prompt(brief, lang, p);
      case 'M5': return buildM5Prompt(brief, lang, p);
      case 'M6': return buildM6Prompt(brief, lang, p);
      case 'M7': return buildM7Prompt(brief, lang, p);
      default: return `Research module ${modId} for this project in ${lang}.`;
    }
  };

  const extractChartData = content => {
    const m = content.match(/<<<CHART_DATA_START>>>([\s\S]*?)<<<CHART_DATA_END>>>/);
    if (!m) return null;
    try { return JSON.parse(m[1].trim()); } catch { return null; }
  };

  const cleanContent = content => content.replace(/<<<CHART_DATA_START>>>[\s\S]*?<<<CHART_DATA_END>>>/g, '').trim();

  const run = useCallback(async () => {
    if (!brief.name) return;
    const id = proj?.id || ('p' + Date.now());
    const existing = proj?.results || [];
    const doneIds = existing.map(r => r.id);
    const toRun = MODULES.filter(m => mods.includes(m.id) && !doneIds.includes(m.id));
    if (!toRun.length) { setSc('work'); return; }

    const p = { id, createdAt: proj?.createdAt||new Date().toISOString(), updatedAt: new Date().toISOString(), brief, lang, mods, results: existing, report: proj?.report||'' };
    setProj(p); setRep(p.report); sv(p); setSc('work');

    const sys = buildSystem(brief, lang);
    const col = [...existing];

    for (const mod of toRun) {
      setCurMod(mod.id); setCurStep(mod.steps[0]); setCurStepIdx(0);

      // Animate steps
      let stepI = 0;
      const stepTimer = setInterval(() => {
        stepI = Math.min(stepI + 1, mod.steps.length - 1);
        setCurStep(mod.steps[stepI]); setCurStepIdx(stepI);
      }, Math.floor((mod.estimatedMin * 60 * 1000) / mod.steps.length));

      let full = '';
      try {
        const prevContent = col.length ? col[col.length-1].content : '';
        full = await callGPT(sys, getModulePrompt(mod.id, brief, lang, prevContent));
      } catch(e) { full = `Error: ${e.message}`; }

      clearInterval(stepTimer);

      const chartData = extractChartData(full);
      const cleanedContent = cleanContent(full);
      const result = { id: mod.id, content: cleanedContent, chartData, at: new Date().toISOString() };
      col.push(result);
      const upd = { ...p, results: col, updatedAt: new Date().toISOString() };
      setProj(upd); sv(upd);
      setExp(ex => ({...ex, [mod.id]: false}));
    }

    setCurMod(null); setCurStep(''); setCurStepIdx(0);
  }, [brief, lang, mods, proj, sv]);

  const genRep = useCallback(async () => {
    if (!proj?.results?.length) return;
    setRepping(true); setRepOpen(true); setRep(''); setXled('');
    try {
      const r = await callGPT(
        `Write a professional research report. ALL output in ${lang} only. No fabricated data.`,
        buildReportPrompt(brief, proj.results, lang)
      );
      setRep(r);
      const upd = {...proj, report: r, updatedAt: new Date().toISOString()};
      setProj(upd); sv(upd);
    } catch(e) { setRep('Error: ' + e.message); }
    setRepping(false);
  }, [lang, brief, proj, sv]);

  const doXl = useCallback(async () => {
    if (!rep||!xl.trim()) return;
    setXlating(true); setXled('');
    try {
      const r = await callGPT('Translate accurately. Preserve all Markdown formatting.', `Translate to ${xl}:\n\n${rep}`);
      setXled(r);
    } catch(e) { setXled('Error: '+e.message); }
    setXlating(false);
  }, [rep, xl]);

  const dlMd = (content, suf='') => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([content],{type:'text/markdown;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+suf+'.md';
    a.click();
  };
  const dlCsv = () => {
    if (!proj?.results) return;
    const csv = [['Module','Content'],...proj.results.map(r=>[r.id,'"'+r.content.replace(/"/g,'""')+'"'])].map(r=>r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+'.csv';
    a.click();
  };
  const dlJson = () => {
    if (!proj?.results) return;
    const pkg = {
      project: brief, lang,
      segments: proj.results.find(r=>r.id==='M1')?.content?.slice(0,3000)||'',
      voc: proj.results.find(r=>r.id==='M3')?.content?.slice(0,3000)||'',
      offers: proj.results.find(r=>r.id==='M5')?.content?.slice(0,3000)||'',
      seo: proj.results.find(r=>r.id==='M7')?.content?.slice(0,3000)||'',
      landingTZ: proj.results.find(r=>r.id==='M6')?.content?.slice(0,3000)||'',
      report: rep?.slice(0,5000)||'',
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(pkg,null,2)],{type:'application/json;charset=utf-8'}));
    a.download = 'CA_'+(brief.name||'research').replace(/\s+/g,'_')+'_agent_package.json';
    a.click();
  };

  // ── LIST ────────────────────────────────────────────────────────────────────
  if (sc === 'list') return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1.5rem'}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:500}}>CA Research</h2>
          <p style={{fontSize:13,color:'#666',marginTop:3}}>Professional target audience research · {MODEL}</p>
        </div>
        <button className="btn-primary" onClick={goNew} style={{padding:'9px 18px'}}>+ New project</button>
      </div>

      {projs.length === 0 && (
        <div className="card" style={{textAlign:'center',padding:'3rem'}}>
          <p style={{fontSize:15,color:'#666',marginBottom:8}}>No projects yet</p>
          <p style={{fontSize:13,color:'#999',marginBottom:'1.5rem'}}>Enter a client website URL and the agent will fill the brief automatically</p>
          <button className="btn-primary" onClick={goNew} style={{padding:'10px 24px'}}>+ New project</button>
        </div>
      )}

      {projs.map(p => {
        const done = (p.results||[]).map(r=>r.id);
        return (
          <div key={p.id} className="card" onClick={()=>openP(p)} style={{cursor:'pointer',marginBottom:10}}>
            <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <p style={{fontSize:14,fontWeight:500,marginBottom:3}}>{p.brief?.name||'Untitled'}</p>
                <p style={{fontSize:12,color:'#666',marginBottom:8}}>{[p.brief?.geoMarket||p.brief?.geo,p.brief?.niche,p.lang].filter(Boolean).join(' · ')}</p>
                <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                  {(p.mods||[]).map(mid => {
                    const m=MODULES.find(x=>x.id===mid); const d=done.includes(mid);
                    return m ? <span key={mid} className="tag" style={{background:d?m.color:'#f5f5f5',color:d?'#fff':'#666',borderColor:d?m.color:'#ddd'}}>{mid}{d?' ✓':''}</span> : null;
                  })}
                  {p.report && <span className="tag" style={{background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>Report ✓</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <p style={{fontSize:11,color:'#888',marginBottom:2}}>{done.length}/{(p.mods||[]).length} modules</p>
                <p style={{fontSize:10,color:'#aaa',marginBottom:8}}>{new Date(p.updatedAt||p.createdAt).toLocaleDateString()}</p>
                <button onClick={e=>{e.stopPropagation();saveAll(loadAll().filter(x=>x.id!==p.id));ref();}} style={{padding:'2px 8px',fontSize:10,color:'#e44',borderColor:'#e44'}}>delete</button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );

  // ── FORM ─────────────────────────────────────────────────────────────────────
  if (sc === 'form') return (
    <div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:'1.5rem'}}>
        <button onClick={()=>setSc('list')}>← Back</button>
        <h2 style={{fontSize:20,fontWeight:500}}>New project</h2>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>Auto-fill from website</p>
        <p style={{fontSize:12,color:'#666',marginBottom:10}}>Enter client site URL — agent reads up to 3 pages and fills the brief automatically.</p>
        <div style={{display:'flex',gap:8,marginBottom:8}}>
          <input value={siteUrl} onChange={e=>setSiteUrl(e.target.value)} onKeyDown={e=>e.key==='Enter'&&parseSite()} placeholder="https://client-site.com" style={{flex:1}}/>
          <button onClick={parseSite} disabled={!siteUrl.trim()||parsing} style={{whiteSpace:'nowrap',flexShrink:0,padding:'0 16px'}}>
            {parsing ? 'Reading…' : 'Read site ↗'}
          </button>
        </div>
        {pMsg && <p style={{fontSize:12,color:pMsg.startsWith('✓')?'#27500A':pMsg.startsWith('✗')?'#c00':'#666'}}>{pMsg}</p>}
      </div>

      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <p style={{fontSize:13,fontWeight:500}}>Project Brief (00_Project_Brief)</p>
          <span className="tag" style={{background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>fill in any language</span>
        </div>
        <div style={{display:'grid',gap:10}}>
          {[
            {k:'name',      l:'Product / service name *',  ph:'Ботулинотерапия, Nutrikey, КРАСТЕХ…'},
            {k:'niche',     l:'Niche / industry',           ph:'Медицинская косметология, hayvan besleme…'},
            {k:'geoCompany', l:'Company geography', ph:'Türkiye, KZ, UAE — all company markets'},
            {k:'geoMarket',  l:'Research market *', ph:'Izmir, Turkey — this research only'},
            {k:'format',    l:'Format',                     ph:'Offline clinic, B2B consulting, SaaS…'},
            {k:'audience',  l:'Target audience',            ph:'Women 30–55, yem fabrikaları, B2B owners…'},
            {k:'result',    l:'Main result for client',     ph:'What the client gets — specific outcome…'},
            {k:'price',     l:'Price range',                ph:'₽15 000–50 000, on request, ₺5000+…'},
            {k:'competitors',l:'Known competitors',         ph:'Competitor A, site.com…'},
          ].map(f => (
            <div key={f.k}>
              <label style={{display:'block',fontSize:11,color:'#666',marginBottom:3}}>{f.l}</label>
              <input value={brief[f.k]} onChange={e=>setBrief(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph}/>
            </div>
          ))}
          <div>
            <label style={{display:'block',fontSize:11,color:'#666',marginBottom:3}}>Additional context</label>
            <textarea value={brief.extra} onChange={e=>setBrief(p=>({...p,extra:e.target.value}))} placeholder="Market specifics, USP, constraints, existing data…" rows={2} style={{resize:'vertical'}}/>
          </div>
        </div>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:4}}>Research language</p>
        <p style={{fontSize:12,color:'#666',marginBottom:10}}>All tables, analysis and report will be written in this language. Brief above is input only.</p>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
          {LANGS.map(l => (
            <button key={l} onClick={()=>setLang(l)} style={{padding:'5px 12px',fontSize:12,borderColor:l===lang?'#378ADD':'#ddd',background:l===lang?'#E6F1FB':'#fff',color:l===lang?'#0C447C':'#111',fontWeight:l===lang?500:400}}>
              {l}
            </button>
          ))}
        </div>
        <p style={{fontSize:11,color:'#666'}}>Selected: <strong>{lang}</strong></p>
      </div>

      <div className="card">
        <p style={{fontSize:13,fontWeight:500,marginBottom:10}}>Select modules</p>
        <div style={{display:'grid',gap:7}}>
          {MODULES.map(m => {
            const on = mods.includes(m.id);
            return (
              <div key={m.id} onClick={()=>setMods(p=>p.includes(m.id)?p.filter(x=>x!==m.id):[...p,m.id])}
                style={{display:'flex',gap:10,alignItems:'flex-start',padding:'10px 12px',borderRadius:8,border:'1px solid '+(on?m.border:'#e5e5e5'),background:on?m.bg:'#fff',cursor:'pointer'}}>
                <div style={{width:16,height:16,marginTop:1,borderRadius:3,border:'2px solid '+(on?m.color:'#ccc'),background:on?m.color:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
                  {on && <span style={{color:'#fff',fontSize:10}}>✓</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <p style={{fontSize:13,fontWeight:500,color:on?m.dark:'#111',marginBottom:1}}>{m.id} · {m.title}</p>
                    <span style={{fontSize:10,color:'#888',flexShrink:0,marginLeft:8}}>~{m.estimatedMin} min</span>
                  </div>
                  <p style={{fontSize:11,color:on?m.color:'#888'}}>{m.desc}</p>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div className="card" style={{background:'#fffbf0',borderColor:'#f5d89e'}}>
        <p style={{fontSize:12,color:'#7a5f00'}}>
          <strong>Model:</strong> {MODEL} &nbsp;·&nbsp;
          <strong>Data policy:</strong> No fabricated data — if unavailable, the agent writes "нет публичных данных" &nbsp;·&nbsp;
          <strong>Est. time:</strong> ~{mods.reduce((s,id)=>s+(MODULES.find(m=>m.id===id)?.estimatedMin||8),0)} min total
        </p>
      </div>

      <button className="btn-primary" onClick={run} disabled={!brief.name||!mods.length}
        style={{width:'100%',padding:'13px',fontSize:14,opacity:brief.name&&mods.length?1:0.4}}>
        Start research in {lang} → {mods.length} module{mods.length!==1?'s':''} · {MODEL}
      </button>
    </div>
  );

  // ── WORK ─────────────────────────────────────────────────────────────────────
  const allMods = MODULES.filter(m => mods.includes(m.id));
  const doneIds = (proj?.results||[]).map(r=>r.id);
  const pending = allMods.filter(m => !doneIds.includes(m.id) && m.id !== curMod);
  const isRun = !!curMod;
  const curModData = MODULES.find(m=>m.id===curMod);

  return (
    <div>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:'1rem',gap:12}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
            <button onClick={()=>setSc('list')}>← Projects</button>
            <h2 style={{fontSize:18,fontWeight:500}}>{brief.name}</h2>
          </div>
          <p style={{fontSize:12,color:'#666'}}>
            {[brief.geoMarket||brief.geo,brief.niche].filter(Boolean).join(' · ')}
            <span className="tag" style={{marginLeft:8,background:'#E6F1FB',color:'#0C447C',borderColor:'#85B7EB'}}>{lang}</span>
            <span className="tag" style={{marginLeft:4,background:'#f0f0f0',color:'#444',borderColor:'#ddd'}}>{MODEL}</span>
          </p>
        </div>
        {!isRun && pending.length > 0 && (
          <button className="btn-primary" onClick={run} style={{flexShrink:0}}>
            + Continue: {pending.map(m=>m.id).join(', ')} ↗
          </button>
        )}
      </div>

      {/* Progress */}
      <div style={{marginBottom:'1.25rem'}}>
        <div style={{display:'flex',gap:3,marginBottom:5}}>
          {allMods.map(m => {
            const d=doneIds.includes(m.id), a=curMod===m.id;
            return <div key={m.id} title={m.title} style={{flex:1,height:4,borderRadius:2,background:d?m.color:a?m.border:'#eee',transition:'background 0.3s'}}/>;
          })}
        </div>
        <p style={{fontSize:11,color:'#888'}}>
          {isRun ? (doneIds.length+1)+'/'+allMods.length+' - '+(curModData ? curModData.title : '') : doneIds.length+'/'+allMods.length+' modules done'+(pending.length ? ' - '+pending.length+' pending' : '')}
        </p>
      </div>

      {/* Active module status */}
      {isRun && curModData && (
        <div className="status-bar">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:16}}>
            <div style={{flex:1}}>
              <p style={{fontSize:12,color:'#aaa',marginBottom:4}}>{curModData.id} · {curModData.title}</p>
              <p style={{fontSize:14,fontWeight:500,marginBottom:10}}>{curStep}</p>
              <div style={{display:'flex',gap:4}}>
                {curModData.steps.map((s,i) => (
                  <div key={i} style={{flex:1,height:2,borderRadius:1,background:i<=curStepIdx?curModData.color:'#333'}}/>
                ))}
              </div>
              <p style={{fontSize:10,color:'#666',marginTop:4}}>{curStepIdx+1} / {curModData.steps.length} steps</p>
            </div>
            <CountdownTimer totalSeconds={curModData.estimatedMin*60} label="Est. remaining"/>
          </div>
        </div>
      )}

      {/* Completed modules */}
      {(proj?.results||[]).map(r => {
        const m = MODULES.find(x=>x.id===r.id); if (!m) return null;
        const open = exp[r.id];
        return (
          <div key={r.id} style={{marginBottom:8,border:'1px solid '+m.border,borderRadius:12,overflow:'hidden'}}>
            <div onClick={()=>setExp(e=>({...e,[r.id]:!e[r.id]}))} style={{display:'flex',alignItems:'center',gap:9,padding:'11px 14px',background:m.bg,cursor:'pointer'}}>
              <span className="tag" style={{background:m.color,color:'#fff',borderColor:m.color}}>{m.id}</span>
              <span style={{flex:1,fontSize:13,fontWeight:500,color:m.dark}}>{m.title}</span>
              <span style={{fontSize:10,color:'#888',marginRight:4}}>{r.at?new Date(r.at).toLocaleDateString():''}</span>
              <span style={{fontSize:12,color:m.color}}>{open?'▲':'▼'}</span>
            </div>
            {open && (
              <div style={{padding:'14px 16px',background:'#fff',borderTop:'1px solid '+m.border}}>
                <ModuleCharts moduleId={r.id} chartData={r.chartData}/>
                <MD text={r.content}/>
              </div>
            )}
          </div>
        );
      })}

      {/* Report & export */}
      {!isRun && (
        <div style={{marginTop:16}}>
          <div style={{border:'1px solid #e5e5e5',borderRadius:12,overflow:'hidden',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'#f8f8f8',borderBottom:'1px solid #e5e5e5'}}>
              <span style={{flex:1,fontSize:14,fontWeight:500}}>Report <span style={{fontSize:11,fontWeight:400,color:'#888'}}>in {lang}</span></span>
              {!rep&&!repping&&<button className="btn-primary" onClick={genRep}>Generate ↗</button>}
              {rep&&!repping&&<button onClick={genRep}>Regenerate</button>}
              {(rep||repping)&&<button onClick={()=>setRepOpen(o=>!o)}>{repOpen?'Collapse ▲':'Expand ▼'}</button>}
            </div>
            {repping && <p style={{padding:'14px',fontSize:13,color:'#888'}}>Generating report in {lang}… (~2–3 min)</p>}
            {rep && repOpen && (
              <>
                <div style={{padding:'14px',maxHeight:600,overflowY:'auto'}}><MD text={rep}/></div>
                <div style={{padding:'10px 14px',borderTop:'1px solid #e5e5e5',background:'#f8f8f8',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  <span style={{fontSize:12,color:'#666',flexShrink:0}}>Translate to:</span>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',flex:1}}>
                    {['Russian','English','Turkish','Arabic','German'].filter(l=>l!==lang).map(l=>(
                      <button key={l} onClick={()=>setXl(l)} style={{padding:'4px 10px',fontSize:11,borderColor:xl===l?'#378ADD':'#ddd',background:xl===l?'#E6F1FB':'#fff',color:xl===l?'#0C447C':'#111'}}>{l}</button>
                    ))}
                    <input value={xl} onChange={e=>setXl(e.target.value)} placeholder="other…" style={{width:90,fontSize:11,padding:'4px 8px'}}/>
                  </div>
                  <button className="btn-primary" onClick={doXl} disabled={!xl.trim()||xlating}>{xlating?'Translating…':'Translate ↗'}</button>
                </div>
                {xled && (
                  <div style={{padding:'14px',borderTop:'1px solid #e5e5e5',maxHeight:400,overflowY:'auto'}}>
                    <p style={{fontSize:11,fontWeight:500,color:'#888',marginBottom:8}}>TRANSLATION — {xl}</p>
                    <MD text={xled}/>
                  </div>
                )}
              </>
            )}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',gap:8}}>
            <button onClick={()=>dlMd(rep||(proj?.results||[]).map(r=>`## ${r.id}\n\n${r.content}`).join('\n\n---\n\n'))}>↓ Report (.md)</button>
            <button onClick={()=>xled&&dlMd(xled,'_translated')} disabled={!xled} style={{opacity:xled?1:0.4}}>↓ Translation (.md)</button>
            <button onClick={dlCsv}>↓ Data (.csv)</button>
            <button onClick={dlJson} style={{borderColor:'#EF9F27',color:'#633806'}} title="JSON package for Agent 2 (content, landing, SEO)">↓ Agent Pack (.json)</button>
          </div>
          <p style={{fontSize:11,color:'#888',textAlign:'center',marginTop:8}}>
            Auto-saved · return anytime · Agent Pack = data package for content & landing agents
          </p>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
