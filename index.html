// usage последнего вызова OpenAI — боковой канал, чтобы не менять сигнатуру callGPT
// (её зовут в 5 местах). Цикл прогона читает это сразу после вызова.
let lastGptUsage = null;
async function callGPT(system, user, temperature, maxTokens) {
  lastGptUsage = null;
  const res = await fetch('/api/proxy', {
    method: 'POST', headers: {'Content-Type':'application/json','X-App-Key':getAppKey()},
    body: JSON.stringify({model:MODEL, max_tokens: maxTokens || 8000, stream:false,
      ...(temperature != null ? { temperature } : {}),
      messages:[{role:'system',content:system},{role:'user',content:user}]}),
  });
  if (!res.ok) throw new Error('API ' + res.status);
  const d = await res.json();
  if (d.error) throw new Error(d.error.message||'API error');
  if (d.usage) lastGptUsage = { prompt: d.usage.prompt_tokens||0, completion: d.usage.completion_tokens||0, total: d.usage.total_tokens||0 };
  return d.choices?.[0]?.message?.content||'';
}

// Реальный веб-поиск (Tavily). Возвращает выдержки с URL; [] при недоступности поиска.
async function callSearch(query, opts) {
  try {
    const res = await fetch('/api/search', {
      method: 'POST', headers: {'Content-Type':'application/json','X-App-Key':getAppKey()},
      body: JSON.stringify({query, ...(opts||{})}),
    });
    if (!res.ok) return [];
    const d = await res.json();
    return d.results || [];
  } catch { return []; }
}

// Общий сборщик досье: гоняет запросы через реальный поиск, дедуплицирует по URL
async function gatherEvidence(queries, maxQueries, maxResults, opts) {
  const o = opts || {};
  const contentChars = o.contentChars || 400;   // сколько текста берём с каждой ссылки
  const perDomain = o.perDomain || 0;            // лимит выдержек с одного домена (0 = без лимита)
  const maxItems = o.maxItems || 24;
  const searchOpts = { max_results: maxResults || 4 };
  if (o.depth) searchOpts.depth = o.depth;                       // 'advanced' — глубже и больше результатов
  if (o.raw) searchOpts.include_raw_content = true;              // полный текст страницы вместо сниппета
  const all = [];
  for (const q of queries.slice(0, maxQueries || 9)) {
    const r = await callSearch(q, searchOpts);
    for (const x of r) {
      const body = (o.raw && x.raw_content) ? x.raw_content : (x.content || '');
      all.push({ q, title: x.title, url: x.url, content: body.slice(0, contentChars), date: x.published_date });
    }
  }
  // Дедуп по URL + разнообразие площадок: один отзовик не должен занять весь бюджет выдержек
  const seenUrl = new Set();
  const perHost = {};
  const out = [];
  for (const x of all) {
    if (seenUrl.has(x.url)) continue;
    seenUrl.add(x.url);
    let host = '';
    try { host = new URL(x.url).hostname.replace(/^www\./, ''); } catch {}
    if (perDomain && host) {
      perHost[host] = (perHost[host] || 0) + 1;
      if (perHost[host] > perDomain) continue;
    }
    out.push(x);
    if (out.length >= maxItems) break;
  }
  return out;
}

// Досье для разведки ниш: по каждой услуге/вертикали-кандидату — спрос и конкуренция.
// Копаем так же глубоко, как для VoC: на стоп-точке M1.2 человек выбирает нишу,
// и цена ошибки здесь — впустую потраченный весь остальной прогон.
async function gatherNicheEvidence(brief, lang) {
  const market = brief.geoMarket || brief.geoCompany || '';
  const manual = (brief.nicheCandidates||'').split(',').map(s=>s.trim()).filter(Boolean);
  const base = manual.length ? manual.slice(0, 6)
    : (brief.selectedServices && brief.selectedServices.length ? brief.selectedServices : (brief.services||[])).slice(0, 6);
  const topics = base.length ? base : [brief.niche || brief.name].filter(Boolean);
  const product = brief.niche || brief.name || '';
  const queries = [];
  for (const s of topics) {
    // Спрос: если тема — вертикаль клиентов, ищем спрос на продукт внутри неё; иначе — на саму услугу
    queries.push(s+' '+market+' '+(manual.length ? product+' спрос' : 'спрос отзывы форум'));
    // Конкуренция и цены
    queries.push(s+' '+market+' цена конкуренты обзор рынка');
    // Живые обсуждения — подтверждают, что боль в этой вертикали реальная, а не предполагаемая
    queries.push(s+' '+market+' форум обсуждение проблемы с заявками и клиентами');
  }
  queries.push(product+' '+market+' тренды рынка объём');
  // Широкий прочёс отраслей — чтобы находить конкретные вертикали (стоматологии,
  // косметология, автосервисы…), а не только услуги из брифа. Даёт объёмную карту ниш.
  queries.push(product+' '+market+' для каких сфер бизнеса и отраслей применяется');
  queries.push(product+' '+market+' какие отрасли и ниши теряют заявки и лиды на сайте');
  queries.push(product+' '+market+' примеры применения по отраслям кейсы');
  queries.push((brief.niche||product)+' '+market+' в каких нишах и отраслях используют');
  return gatherEvidence(queries, 26, 6, { depth:'advanced', raw:true, contentChars:1200, perDomain:3, maxItems:50 });
}

// Досье для M3 (VoC): живой язык аудитории — отзывы, форумы, жалобы, вопросы.
// Копаем глубоко (advanced + полный текст страниц) и вширь (сегмент + отзывы о конкурентах),
// с лимитом на домен — чтобы не «мусолить» одну фразу с одного отзовика.
// ── КОНТРАКТ С КОНТЕНТ-МАШИНОЙ ───────────────────────────────────────────
// Разбираем markdown-таблицы, которые модули и так генерируют, в структурированный вид.
// Так контент-машина получает данные объектами, а промпты трогать не нужно —
// ни лишних токенов, ни риска обрезки вывода.
function splitMdRow(line) {
  return line.replace(/^\|/, '').replace(/\|$/, '').split('|').map(c => c.trim());
}
function isMdSeparator(s) {
  return /^[\s|:-]+$/.test(s) && s.includes('-') && s.includes('|');
}
function parseMdTables(md) {
  const lines = String(md || '').split('\n');
  const out = [];
  let heading = '';
  for (let i = 0; i < lines.length; i++) {
    const t = lines[i].trim();
    // Заголовком таблицы считаем ближайшую строку-заголовок выше неё
    if (/^#{1,6}\s+/.test(t)) { heading = t.replace(/^#+\s*/, '').trim(); continue; }
    if (/^BLOCK\s/i.test(t) || /^SEO-\d/i.test(t)) { heading = t.replace(/\s*[:—-]\s*$/, '').trim(); continue; }
    if (t.startsWith('|') && i + 1 < lines.length && isMdSeparator(lines[i + 1].trim())) {
      const headers = splitMdRow(t);
      const rows = [];
      let j = i + 2;
      for (; j < lines.length; j++) {
        const rt = lines[j].trim();
        if (!rt.startsWith('|')) break;
        const cells = splitMdRow(rt);
        const obj = {};
        headers.forEach((h, k) => { if (h) obj[h] = cells[k] === undefined ? '' : cells[k]; });
        rows.push(obj);
      }
      if (rows.length) out.push({ heading: heading, rows: rows });
      i = j - 1;
    }
  }
  return out;
}

// Разбирает один результат модуля в {title, generated_at, tables, markdown}.
function buildModuleEntry(r) {
  const m = MODULES.find(x => x.id === r.id);
  const tables = {};
  parseMdTables(r.content).forEach((t, idx) => {
    let key = t.heading || ('table_' + (idx + 1));
    if (tables[key]) key = key + ' (' + (idx + 1) + ')';   // одинаковые заголовки не затираем
    tables[key] = t.rows;
  });
  return {
    title: m ? (m.titleRu || m.title) : r.id,
    generated_at: r.at || null,
    tables: tables,
    markdown: r.content || '',
  };
}
const pickTable = (modulesObj, modId, needle) => {
  const mod = modulesObj[modId];
  if (!mod) return [];
  const key = Object.keys(mod.tables).find(k => k.toLowerCase().includes(needle.toLowerCase()));
  return key ? mod.tables[key] : [];
};

// Пакет для внешнего агента. Данные — на ЯЗЫКЕ ИССЛЕДОВАНИЯ, без перевода:
// подлинные формулировки аудитории теряются при переводе туда-обратно (ПОЖЕЛАНИЯ п.4).
// schema_version 2: по-нишевые модули (M2–M7) вложены под своей нишей в research_by_niche.
// БЫЛО (v1): modules[r.id] = {...} — один и тот же id ('M2','M3'...) у каждой выбранной
// ниши, объект-словарь держит только ПОСЛЕДНЮЮ записанную нишу, остальные молча терялись
// (обнаружено на реальном прогоне с 2 нишами: JSON содержал только одну из двух).
function buildAgentPackage(brief, lang, results, report) {
  const all = results || [];
  const globalModules = {};       // M1_2 и другие модули без ниши — один результат на проект
  const byNiche = {};              // niche name -> { modId -> result }
  for (const r of all) {
    if (isPerNiche(r.id) && r.niche) {
      (byNiche[r.niche] || (byNiche[r.niche] = {}))[r.id] = r;
    } else {
      globalModules[r.id] = buildModuleEntry(r);
    }
  }
  const m12 = all.find(r => r.id === 'M1_2');
  const research_by_niche = {};
  for (const nicheName of Object.keys(byNiche)) {
    const modulesForNiche = {};
    for (const r of Object.values(byNiche[nicheName])) modulesForNiche[r.id] = buildModuleEntry(r);
    research_by_niche[nicheName] = {
      // Быстрые ссылки на то, что контент-машина просила в фидбеке: боли, персоны,
      // цитаты, гипотезы, кластеры — тем же составом, что в таблицах отчёта, СВОЕЙ ниши.
      key_data: {
        competitors: pickTable(modulesForNiche, 'M2', 'BLOCK 06'),
        voc: pickTable(modulesForNiche, 'M3', 'BLOCK 07'),
        personas: pickTable(modulesForNiche, 'M4', 'BLOCK 09'),
        jtbd: pickTable(modulesForNiche, 'M4', 'BLOCK 10'),
        hypotheses: pickTable(modulesForNiche, 'M5', 'BLOCK 16'),
        seo_clusters: pickTable(modulesForNiche, 'M7', 'SEO-02'),
      },
      modules: modulesForNiche,
    };
  }
  return {
    schema_version: 2,
    generated_at: new Date().toISOString(),
    research_language: lang,
    project: brief,
    niches: (m12 && m12.nicheData && m12.nicheData.niches) || [],   // полная карта разведки (M1.2)
    selected_niches: nichesOf(brief),                                // какие из них реально исследованы в этом прогоне
    key_data: { segments: pickTable(globalModules, 'M1_2', 'BLOCK 04') },  // проектный уровень, не по нише
    global_modules: globalModules,
    research_by_niche: research_by_niche,
    executive_summary: report || '',
  };
}


// Конкуренты, которых НАШЁЛ M2 → идут в поиск VoC для M3.
// Жалобы на конкурентов — самый плотный источник боли, языка и подсказок по фичам,
// а поле «конкуренты» в брифе обычно пустое, поэтому берём их из результата M2.
function competitorsFromM2(m2Result, brief) {
  const out = [];
  const ourName = (brief.name || '').toLowerCase().trim();
  const isOurs = n => {
    const v = String(n).toLowerCase();
    return ourName && (v.includes(ourName) || ourName.includes(v));
  };
  // Путь 1 — машиночитаемая карта конкурентов из CHART DATA, надёжнее разбора таблицы
  const matrix = m2Result && m2Result.chartData && m2Result.chartData.competitorMatrix;
  if (Array.isArray(matrix)) {
    for (const c of matrix) {
      if (c && c.name && !c.isUs && !isOurs(c.name)) out.push(String(c.name).trim());
    }
  }
  // Путь 2 — запасной: строки таблицы BLOCK 06 вида | C001 | Название | …
  if (!out.length && m2Result && m2Result.content) {
    for (const line of m2Result.content.split('\n')) {
      const m = line.match(/^\s*\|\s*C\d+\s*\|\s*([^|]+)\|/);
      if (!m) continue;
      const name = m[1].replace(/\(\*\)|\*\*|\[|\]/g, '').trim();
      if (name && !isOurs(name)) out.push(name);
    }
  }
  const seen = new Set();
  return out.filter(n => n && !seen.has(n.toLowerCase()) && seen.add(n.toLowerCase())).slice(0, 5);
}

async function gatherVoCEvidence(brief, discoveredCompetitors) {
  const market = brief.geoMarket || brief.geoCompany || '';
  const product = brief.niche || brief.name || '';
  const niches = (brief.selectedNiche||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,3);
  const topics = niches.length ? niches : [product];
  // Конкуренты: из брифа (если заполнен) + найденные модулем M2
  const fromBrief = (brief.competitors||'').split(/[,;]/).map(s=>s.trim()).filter(Boolean);
  const seenComp = new Set();
  const competitors = [...fromBrief, ...(discoveredCompetitors||[])]
    .filter(c => c && !seenComp.has(c.toLowerCase()) && seenComp.add(c.toLowerCase()))
    .slice(0, 5);
  const queries = [];
  // 1. Боли квалифицированного сегмента (бизнес, привлекающий клиентов через свой сайт)
  for (const n of topics) {
    queries.push(n+' '+market+' мало заявок с сайта конверсия проблемы');
    queries.push(n+' '+market+' форум "не работает" OR "бесит" OR "разочарован"');
    queries.push('как увеличить заявки с сайта '+n+' '+market+' обсуждение');
  }
  // 2. Отзывы о конкурентах = сразу и боль, и язык, и подсказки по фичам
  for (const c of competitors) {
    queries.push(c+' отзывы недостатки жалобы');
    queries.push(c+' "не рекомендую" OR "разочарован" проблемы поддержка');
  }
  // 3. Язык самой категории продукта
  queries.push(product+' '+market+' отзывы клиентов форум');
  return gatherEvidence(queries, 20, 6, { depth:'advanced', raw:true, contentChars:1500, perDomain:3, maxItems:45 });
}

// Досье для M7 (SEO). Важно понимать границы инструмента: веб-поиск НЕ измеряет Wordstat.
// Он даёт две реальные вещи: (а) страницы, которые фактически находятся по целевому запросу —
// это и есть поисковые конкуренты; (б) статьи, где частотности уже опубликованы со ссылкой.
// Всё остальное модуль обязан помечать как незамеренное, а не выдумывать.
async function gatherSeoEvidence(brief) {
  const market = brief.geoMarket || brief.geoCompany || '';
  const product = brief.niche || brief.name || '';
  const niches = (brief.selectedNiche||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,3);
  const topics = niches.length ? niches : [product];
  const queries = [];
  for (const n of topics) {
    // Поиск по самому целевому запросу = фактическая выдача: кто реально по нему находится
    queries.push(product+' для '+n);
    queries.push('как выбрать '+product+' '+n+' '+market);
  }
  queries.push(product+' '+market);
  queries.push(product+' '+market+' частотность запросов вордстат статистика');
  queries.push(product+' '+market+' seo продвижение семантика запросы');
  // perDomain=2 — для SEO важна ширина выдачи (разные домены), а не глубина одного сайта
  return gatherEvidence(queries, 12, 8, { depth:'advanced', raw:true, contentChars:1000, perDomain:2, maxItems:35 });
}

// Досье для M2: конкуренты, аналоги, цены, отзывы — в выбранной нише
async function gatherCompetitorEvidence(brief) {
  const market = brief.geoMarket || brief.geoCompany || '';
  const product = brief.niche || brief.name || '';
  const niche = brief.selectedNiche || '';
  const named = (brief.competitors||'').split(/[,;]/).map(s=>s.trim()).filter(Boolean).slice(0, 4);
  const queries = [
    product+' '+market+' конкуренты сравнение сервисов',
    product+' '+market+' аналоги цены тарифы',
    (niche ? product+' для '+niche+' '+market : product+' '+market)+' отзывы',
  ];
  for (const c of named) queries.push(c+' отзывы цены тарифы');
  return gatherEvidence(queries, 8, 4);
}

// Единый блок «работай только с этим материалом» для промптов
function evidenceSection(evidence) {
  return (evidence && evidence.length)
    ? '\nREAL WEB SEARCH EVIDENCE (collected just now — use ONLY this material for market facts, competitor data, sources and dates; do NOT supplement from memory):\n'
      + evidence.map((e,i)=>'['+(i+1)+'] '+(e.title||'')+' — '+e.url+(e.date?' ('+e.date+')':'')+'\n'+e.content).join('\n\n')
      + '\n\nEVIDENCE RULES:\n- Every fact/source/date must come from evidence [n] or be marked "нет данных (публично)" with Confidence=1–2.\n- Never invent URLs or "Дата проверки" — verification date is TODAY for evidence-backed rows, «не проверялось» otherwise.\n- Sources older than 12 months: mark "устаревшее" and weigh lower.\n- Note platform bias: review sites skew negative, forums skew skeptical/technical.\n'
    : '\nNO WEB EVIDENCE AVAILABLE (search unconfigured or empty). Be conservative: mark ALL market claims with Confidence=1–2 and «нет данных (публично)» where applicable. Do not invent URLs or dates.\n';
}

async function fetchSite(url) {
  let base = url.trim().replace(/\/$/, '');
  if (!/^https?:\/\//i.test(base)) base = 'https://' + base; // пользователь обычно вводит адрес без схемы
  const pages = [];
  const candidates = [base, base+'/hakkimizda', base+'/about', base+'/hizmetler',
    base+'/services', base+'/o-nas', base+'/uslugi', base+'/products', base+'/o-kompanii'];
  for (const u of candidates) {
    try {
      const r = await fetch(PROXY+'?url='+encodeURIComponent(u));
      if (!r.ok) continue;
      const t = await r.text();
      const clean = t
        .replace(/<script[\s\S]*?<\/script>/gi,' ')   // выкидываем код и стили,
        .replace(/<style[\s\S]*?<\/style>/gi,' ')     // иначе в «текст» попадает CSS/JS-каша
        .replace(/<noscript[\s\S]*?<\/noscript>/gi,' ')
        .replace(/<!--[\s\S]*?-->/g,' ')
        .replace(/<[^>]+>/g,' ')
        .replace(/\s+/g,' ').trim();
      if (clean.length>300) { pages.push({url:u, text:clean.slice(0,2500)}); if(pages.length>=3) break; }
    } catch {}
  }
  return pages;
}

    (completedIds.includes('M1_2')

// ── MARKDOWN ────────────────────────────────────────────────────────────────────
function MD({ text }) {
  if (!text) return null;
  const lines = text.split('\n');
  const out = []; let tbl = []; let k = 0;
  const ft = () => {
    if (tbl.length < 2) { tbl.forEach(l => out.push(<p key={k++} style={{margin:'2px 0',fontSize:12,color:'#666'}}>{l}</p>)); tbl=[]; return; }
    const hdrs = tbl[0].split('|').map(h=>h.trim()).filter(Boolean);
    const rows = tbl.slice(2).map(r=>r.split('|').map(c=>c.trim()).filter(Boolean));
    out.push(
      <div key={k++} style={{overflowX:'auto',margin:'10px 0'}}>
        <table>
          <thead><tr>{hdrs.map((h,i)=><th key={i}>{renderCellWithGlossary(h)}</th>)}</tr></thead>
          <tbody>{rows.map((row,ri)=><tr key={ri}>{row.map((c,ci)=><td key={ci}>{renderCellWithGlossary(c)}</td>)}</tr>)}</tbody>
        </table>
      </div>
    );
    tbl=[];
  };
  for (const line of lines) {
    if (line.trim().startsWith('|')) { tbl.push(line); continue; }
    if (tbl.length) ft();
    if (line.startsWith('## ')) out.push(<h2 key={k++} style={{margin:'16px 0 5px',fontSize:15,fontWeight:500,borderBottom:'1px solid #eee',paddingBottom:3}}>{line.slice(3)}</h2>);
    else if (line.startsWith('### ')) out.push(<h3 key={k++} style={{margin:'12px 0 4px',fontSize:14,fontWeight:500}}>{line.slice(4)}</h3>);
    else if (line.startsWith('#### ')) out.push(<h4 key={k++} style={{margin:'10px 0 3px',fontSize:13,fontWeight:500}}>{line.slice(5)}</h4>);
    else if (line.startsWith('**') && line.endsWith('**') && line.length>4) out.push(<p key={k++} style={{margin:'10px 0 3px',fontSize:13,fontWeight:500}}>{line.slice(2,-2)}</p>);
    else if (/^[-•]\s/.test(line)) out.push(<p key={k++} style={{margin:'2px 0 2px 12px',fontSize:13}}>· {line.slice(2)}</p>);
    else if (!line.trim()) out.push(<div key={k++} style={{height:5}}/>);
    else {
      const parts = line.split(/\*\*(.*?)\*\*/);
      out.push(<p key={k++} style={{margin:'3px 0',fontSize:13,lineHeight:1.6}}>{parts.map((p,i)=>i%2===1?<strong key={i}>{p}</strong>:p)}</p>);
    }
  }
  if (tbl.length) ft();
  return React.createElement(React.Fragment, null, ...out);
}

// ── TIMER COMPONENT ─────────────────────────────────────────────────────────────
function CountdownTimer({ totalSeconds, label }) {
  const [elapsed, setElapsed] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    ref.current = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(ref.current);
  }, []);
  const remaining = Math.max(0, totalSeconds - elapsed);
  const mm = String(Math.floor(remaining / 60)).padStart(2, '0');
  const ss = String(remaining % 60).padStart(2, '0');
  const pct = Math.min(100, (elapsed / totalSeconds) * 100);
  return (
    <div>
      <div style={{fontSize:11,color:'#aaa',marginBottom:4}}>{label}</div>
      <div className="timer">{mm}:{ss}</div>
      <div style={{marginTop:8,height:3,background:'#333',borderRadius:2}}>
        <div style={{height:'100%',width:`${pct}%`,background:'#4ade80',borderRadius:2,transition:'width 1s linear'}}/>
      </div>
    </div>
  );
}

function PieChart({ data, title }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !data?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'doughnut',
      data: {
        labels: data.map(d=>d.label),
        datasets: [{ data: data.map(d=>d.value), backgroundColor: data.map((d,i)=>d.color||['#639922','#0F6E56','#3C3489','#633806','#712B13','#72243E'][i%6]) }]
      },
      options: { plugins: { legend: { position: 'right' } }, responsive: true }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [data]);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:10}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:8}}>{title}</p>
      <canvas ref={canvasRef} height={200}/>
    </div>
  );
}

function BarChart({ labels, values, title, color='#639922' }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !values?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels, datasets: [{ label: title, data: values, backgroundColor: color }] },
      options: { plugins: { legend: { display: false } }, responsive: true, scales: { y: { beginAtZero: true } } }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [labels, values]);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:10}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:8}}>{title}</p>
      <canvas ref={canvasRef} height={200}/>
    </div>
  );
}

// Диаграмма ниш по эффективности: горизонтальные столбики, отсортированы max→min,
// цвет по вердикту. Даёт «карту рынка» — видно сильные и слабые ниши разом.
function NicheScoreChart({ niches }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current || !niches?.length) return;
    if (chartRef.current) chartRef.current.destroy();
    const sorted = [...niches].sort((a,b)=>(b.score||0)-(a.score||0));
    const col = v => v==='Go' ? '#4A7C1F' : v==='Maybe' ? '#D98A2B' : '#C0503A';
    chartRef.current = new Chart(canvasRef.current, {
      type: 'bar',
      data: { labels: sorted.map(n=>n.name), datasets: [{ data: sorted.map(n=>n.score||0), backgroundColor: sorted.map(n=>col(n.verdict)) }] },
      options: { indexAxis:'y', maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ beginAtZero:true } } }
    });
    return () => { if(chartRef.current) chartRef.current.destroy(); };
  }, [niches]);
  const h = Math.max(160, (niches?.length||0) * 24);
  return (
    <div style={{background:'#fff',border:'1px solid #eee',borderRadius:10,padding:'1rem',marginBottom:14}}>
      <p style={{fontSize:13,fontWeight:500,marginBottom:8}}>Ниши по эффективности (баллу): <span style={{color:'#4A7C1F'}}>Go</span> · <span style={{color:'#D98A2B'}}>Maybe</span> · <span style={{color:'#C0503A'}}>No-Go</span></p>
      <div style={{position:'relative',height:h}}><canvas ref={canvasRef}/></div>
    </div>
  );
}

          values={d.semanticClusters.map(c=>c.volume||0)}
          title="Semantic Clusters by Volume"
          color='#72243E'
        />
      </div>
    );
    return null;
  } catch { return null; }
}



// ── HTML REPORT GENERATOR
function generateHTMLReport(brief, results, lang, priceLayers, selectedLayers, singleModId) {
  const targetResults = singleModId ? results.filter(r=>r.id===singleModId) : results;
  const completedMods = MODULES.filter(m => targetResults.find(r=>r.id===m.id));
  const date = new Date().toLocaleDateString('ru-RU');
  const hasCompany = brief.currentRevenue || brief.currentClients || brief.currentAvgCheck;
  const chosenLayer = selectedLayers && selectedLayers.length > 0 && priceLayers && priceLayers.length > 0
    ? selectedLayers.map(i => priceLayers[i]&&priceLayers[i].name).filter(Boolean).join(', ')
    : null;

  const moduleColors = { M1:'#639922', M2:'#0F6E56', M3:'#1565A8', M4:'#3C3489', M5:'#633806', M6:'#712B13', M7:'#72243E' };
  const moduleBgs = { M1:'#EAF3DE', M2:'#E1F5EE', M3:'#E3EFFE', M4:'#EEEDFE', M5:'#FAEEDA', M6:'#FAECE7', M7:'#FBEAF0' };
  const moduleDarks = { M1:'#27500A', M2:'#085041', M3:'#0C447C', M4:'#26215C', M5:'#412402', M6:'#4A1B0C', M7:'#4B1528' };

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function mdToHtml(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '', inTable = false, tableRows = [];
    const flushTable = () => {
      if (tableRows.length < 2) { tableRows.forEach(r => { html += '<p style="font-size:12px;color:#666;margin:2px 0">'+esc(r)+'</p>'; }); tableRows=[]; inTable=false; return; }
      const hdrs = tableRows[0].split('|').map(h=>h.trim()).filter(Boolean);
      const rows = tableRows.slice(2).map(r=>r.split('|').map(c=>c.trim()).filter(Boolean));
      html += '<div style="overflow-x:auto;margin:12px 0"><table style="border-collapse:collapse;width:100%;font-size:12px"><thead><tr>';
      hdrs.forEach(h => { html += '<th style="padding:7px 10px;background:#f4f4f4;border:1px solid #e0e0e0;text-align:left;font-weight:600;white-space:normal;min-width:70px;color:#333">'+esc(h)+'</th>'; });
      html += '</tr></thead><tbody>';
      rows.forEach((row,ri) => {
        html += '<tr style="background:'+(ri%2===0?'#fff':'#fafafa')+'">';
        row.forEach(c => { html += '<td style="padding:7px 10px;border:1px solid #e0e0e0;vertical-align:top;word-break:break-word;max-width:240px;line-height:1.5">'+esc(c)+'</td>'; });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      tableRows=[]; inTable=false;
    };
    for (const line of lines) {
      if (line.trim().startsWith('|')) { inTable=true; tableRows.push(line); continue; }
      if (inTable) flushTable();
      const t = line.trim();
      if (line.startsWith('# ')) html += '<h1 style="font-size:20px;font-weight:600;margin:24px 0 8px;color:#111;border-bottom:2px solid #639922;padding-bottom:6px">'+esc(line.slice(2))+'</h1>';
      else if (line.startsWith('## ')) html += '<h2 style="font-size:16px;font-weight:600;margin:20px 0 6px;color:#111;padding-bottom:4px;border-bottom:1px solid #e5e5e5">'+esc(line.slice(3))+'</h2>';
      else if (line.startsWith('### ')) html += '<h3 style="font-size:14px;font-weight:600;margin:14px 0 4px;color:#333">'+esc(line.slice(4))+'</h3>';
      else if (line.startsWith('#### ')) html += '<h4 style="font-size:13px;font-weight:600;margin:10px 0 3px;color:#444">'+esc(line.slice(5))+'</h4>';
      else if (/^\*\*(.+)\*\*$/.test(t)) html += '<p style="font-size:13px;font-weight:600;margin:8px 0 3px;color:#111">'+esc(t.slice(2,-2))+'</p>';
      else if (t.startsWith('**') && t.includes('**')) {
        html += '<p style="margin:4px 0;font-size:13px;line-height:1.6">'+t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')+'</p>';
      }
      else if (/^[-•·]\s/.test(t)) html += '<p style="margin:3px 0 3px 18px;font-size:13px;color:#333">• '+esc(t.slice(2))+'</p>';
      else if (/^\d+\.\s/.test(t)) html += '<p style="margin:3px 0 3px 18px;font-size:13px;color:#333">'+esc(t)+'</p>';
      else if (!t) html += '<div style="height:8px"></div>';
      else html += '<p style="margin:4px 0;font-size:13px;line-height:1.6;color:#333">'+esc(line)+'</p>';
    }
    if (inTable) flushTable();
    return html;
  }

  // Extract key insights from M1 content for executive summary
  function extractInsights(content) {
    if (!content) return [];
    const insights = [];
    const lines = content.split('\n');
    // Find "CONCLUSION" or "Вывод" lines
    for (let i=0; i<lines.length; i++) {
      const l = lines[i].trim();
      if ((l.startsWith('CONCLUSION') || l.startsWith('Вывод:') || l.startsWith('Вывод ')) && lines[i+1]) {
        const text = lines[i+1].trim() || l.replace(/^(CONCLUSION[^:]*:|Вывод:)\s*/,'');
        if (text.length > 20) insights.push(text);
      }
    }
    return insights.slice(0,5);
  }

  // Build charts for M1
  let chartDivs = '', chartScripts = '';
  const m1r = targetResults.find(r=>r.id==='M1');
  if (m1r && m1r.chartData) {
    const d = typeof m1r.chartData === 'string' ? JSON.parse(m1r.chartData) : m1r.chartData;
    if (d) {
      chartDivs = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:16px 0">'
        +'<div style="background:#f8f8f8;border-radius:10px;padding:14px;border:1px solid #eee"><p style="font-size:11px;font-weight:600;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">Доли сегментов в SOM</p><canvas id="rpt_pie" height="190"></canvas></div>'
        +'<div style="background:#f8f8f8;border-radius:10px;padding:14px;border:1px solid #eee"><p style="font-size:11px;font-weight:600;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">TAM → SAM → SOM</p><canvas id="rpt_bar" height="190"></canvas></div>'
        +'</div>'
        +'<div style="background:#f8f8f8;border-radius:10px;padding:14px;border:1px solid #eee;margin-bottom:16px"><p style="font-size:11px;font-weight:600;color:#666;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em">Матрица ниш: спрос vs конкуренция</p><canvas id="rpt_bubble" height="220"></canvas></div>';

      const clients = parseInt(brief.currentClients||'0')||0;
      const dSafe = JSON.stringify(d).replace(/<\/script>/gi,'<\\/script>');
      chartScripts = '<script>window.addEventListener("load",function(){try{'
        +'var d='+dSafe+';'
        +'if(d.marketShare&&document.getElementById("rpt_pie")){'
        +'new Chart(document.getElementById("rpt_pie"),{type:"doughnut",data:{labels:d.marketShare.map(function(x){return x.label}),datasets:[{data:d.marketShare.map(function(x){return x.value}),backgroundColor:d.marketShare.map(function(x,i){return x.color||["#639922","#0F6E56","#1565A8","#633806","#72243E","#3C3489","#888780"][i%7]}),borderWidth:0}]},options:{plugins:{legend:{position:"bottom",labels:{font:{size:10},padding:8,boxWidth:12}}},cutout:"55%",responsive:true}});}'
        +'if(d.tamSamSom&&document.getElementById("rpt_bar")){'
        +'var you='+clients+';var som=d.tamSamSom.som||0;'
        +'var labels=["TAM","SAM","SOM"];var vals=[d.tamSamSom.tam,d.tamSamSom.sam,som];var colors=["#ccc","#97C459","#639922"];'
        +'if(you>0){labels.push("Вы");vals.push(you);colors.push("#378ADD");}'
        +'new Chart(document.getElementById("rpt_bar"),{type:"bar",data:{labels:labels,datasets:[{data:vals,backgroundColor:colors,borderRadius:5}]},options:{plugins:{legend:{display:false}},responsive:true,scales:{y:{beginAtZero:true,ticks:{font:{size:10}}},x:{ticks:{font:{size:11}}}}}});'
        +'if(som>0&&you>0){var pct=Math.min(100,Math.round(you/som*100));var bar=document.getElementById("rpt_pos_bar");if(bar){bar.style.width=Math.max(2,pct)+"%";}var lbl=document.getElementById("rpt_pos_lbl");if(lbl){lbl.textContent=you+" / "+som+" = "+pct+"%";}}}'
        +'if(d.niches&&document.getElementById("rpt_bubble")){'
        +'new Chart(document.getElementById("rpt_bubble"),{type:"bubble",data:{datasets:d.niches.map(function(n){return{label:n.name,data:[{x:n.demand||1,y:n.competition||1,r:Math.max(6,(n.score||5)*1.8)}],backgroundColor:n.verdict==="Go"?"rgba(99,153,34,0.7)":n.verdict==="Hold"?"rgba(239,159,39,0.65)":"rgba(136,135,128,0.55)"};})},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{size:10},padding:6,boxWidth:12}}},scales:{x:{title:{display:true,text:"Спрос (1-5)",font:{size:10}},min:0,max:6,ticks:{font:{size:9}}},y:{title:{display:true,text:"Конкуренция (1-5)",font:{size:10}},min:0,max:6,ticks:{font:{size:9}}}}}});}'
        +'}catch(e){console.warn("Chart error",e);}});<'+'/script>';
    }
  }

  // Графики остальных модулей в HTML-отчёте: карта ниш (M1.2), карта конкурентов (M2),
  // осознанность (M4), семантика (M7). Раньше отчёт рисовал только M1 (который отключён).
  const moduleChartDivs = {};
  let extraScripts = '';
  function pushReportChart(chartKey, canvasId, title, subtitle, height) {
    // chartKey = resKey() формата: 'M1_2' (глобальный) или 'M2@@Ниша' (по-нишевой) —
    // так у каждой (модуль,ниша) пары свой набор графиков, а не общий на весь отчёт.
    moduleChartDivs[chartKey] = (moduleChartDivs[chartKey]||'')
      + '<div style="background:#f8f8f8;border-radius:10px;padding:14px;border:1px solid #eee;margin:8px 0 16px">'
      + '<p style="font-size:11px;font-weight:600;color:#666;margin-bottom:'+(subtitle?'4':'8')+'px;text-transform:uppercase;letter-spacing:0.04em">'+esc(title)+'</p>'
      + (subtitle?'<p style="font-size:11px;color:#888;margin-bottom:8px">'+esc(subtitle)+'</p>':'')
      + '<canvas id="'+canvasId+'" height="'+(height||220)+'"></canvas></div>';
  }
  const safeJson = o => JSON.stringify(o).replace(/<\/script>/gi,'<\\/script>');

  const m12rep = targetResults.find(r=>r.id==='M1_2');
  const niches12 = m12rep && m12rep.nicheData && Array.isArray(m12rep.nicheData.niches) ? m12rep.nicheData.niches : null;
  if (niches12 && niches12.length) {
    pushReportChart('M1_2','rpt_niches','Полная карта ниш по эффективности (баллу)','Зелёные — Go, оранжевые — Maybe, красные — No-Go', Math.max(180, niches12.length*24));
    if (brief.selectedNiche) moduleChartDivs['M1_2'] += '<div style="background:#EFF6E4;border:1px solid #cfe3b4;border-radius:8px;padding:10px 14px;margin:-8px 0 16px"><span style="font-size:11px;font-weight:700;color:#27500A;text-transform:uppercase;letter-spacing:0.04em">Для исследования выбраны:</span> <span style="font-size:13px;font-weight:600;color:#111">'+esc(brief.selectedNiche)+'</span></div>';
    extraScripts += 'if(document.getElementById("rpt_niches")){var nn='+safeJson(niches12)+'.slice().sort(function(a,b){return (b.score||0)-(a.score||0)});'
      +'var coln=function(v){return v==="Go"?"#4A7C1F":v==="Maybe"?"#D98A2B":"#C0503A";};'
      +'new Chart(document.getElementById("rpt_niches"),{type:"bar",data:{labels:nn.map(function(n){return n.name}),datasets:[{data:nn.map(function(n){return n.score||0}),backgroundColor:nn.map(function(n){return coln(n.verdict)})}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});}';
  }

  // M2/M4/M7 графики — ОДИН НАБОР НА НИШУ, не один на весь отчёт (при нескольких нишах
  // .find() брал только первую попавшуюся; секции модулей в отчёте уже идут по одной
  // на (модуль,ниша) — графики должны совпадать с этим 1:1). Ключ — resKey(rep), тот же,
  // что используют секции ('M2' для глобального, 'M2@@Ниша' для по-нишевого); canvas id
  // разбавлен индексом — id должен быть уникален во всём документе, а имя ниши как id
  // небезопасно (кириллица/пробелы).
  targetResults.filter(r=>r.id==='M2').forEach((rep, i) => {
    const compMx = rep.chartData && rep.chartData.competitorMatrix;
    if (!compMx || !compMx.length) return;
    const canvasId = 'rpt_comp_'+i;
    const subtitle = (rep.niche ? 'Ниша: '+rep.niche+' · ' : '') + 'Зелёная точка — мы. Пустые зоны — свободное позиционирование.';
    pushReportChart(resKey(rep), canvasId, 'Карта позиционирования: цена и качество', subtitle, 240);
    extraScripts += 'if(document.getElementById("'+canvasId+'")){var cc='+safeJson(compMx)+';'
      +'new Chart(document.getElementById("'+canvasId+'"),{type:"bubble",data:{datasets:cc.map(function(d){return{label:d.name+(d.isUs?" (мы)":""),data:[{x:d.price||0,y:d.quality||0,r:d.isUs?11:7}],backgroundColor:d.isUs?"#639922DD":"#0F6E5666",borderColor:d.isUs?"#27500A":"transparent",borderWidth:d.isUs?2:0};})},options:{responsive:true,scales:{x:{title:{display:true,text:"Цена: 1 дешевле, 5 дороже"},min:0,max:6},y:{title:{display:true,text:"Качество и ценность (1-5)"},min:0,max:6}}}});}';
  });

  targetResults.filter(r=>r.id==='M4').forEach((rep, i) => {
    const awLv = rep.chartData && rep.chartData.awarenessLevels;
    if (!awLv || !awLv.length) return;
    const canvasId = 'rpt_aware_'+i;
    const subtitle = rep.niche ? 'Ниша: '+rep.niche : '';
    pushReportChart(resKey(rep), canvasId, 'Уровни осознанности по сегментам, %', subtitle, Math.max(180, awLv.length*40+40));
    extraScripts += 'if(document.getElementById("'+canvasId+'")){var aa='+safeJson(awLv)+';'
      +'var lv=[["Не осознаёт","unaware","#C0503A"],["Проблема","problem","#D98A2B"],["Решения","solution","#E3B23C"],["Продукты","product","#7FB04F"],["Всё знает","most","#4A7C1F"]];'
      +'new Chart(document.getElementById("'+canvasId+'"),{type:"bar",data:{labels:aa.map(function(d){return d.segment||""}),datasets:lv.map(function(x){return{label:x[0],data:aa.map(function(d){return d[x[1]]||0}),backgroundColor:x[2]};})},options:{indexAxis:"y",responsive:true,scales:{x:{stacked:true},y:{stacked:true}},plugins:{legend:{position:"bottom",labels:{boxWidth:12,font:{size:10}}}}}});}';
  });

  targetResults.filter(r=>r.id==='M7').forEach((rep, i) => {

    const subtitle = rep.niche ? 'Ниша: '+rep.niche : '';
    pushReportChart(resKey(rep), canvasId, 'Семантические кластеры по объёму', subtitle, 220);
    extraScripts += 'if(document.getElementById("'+canvasId+'")){var ss='+safeJson(semCl)+';'
      +'new Chart(document.getElementById("'+canvasId+'"),{type:"bar",data:{labels:ss.map(function(c){return c.cluster}),datasets:[{data:ss.map(function(c){return c.volume||0}),backgroundColor:"#72243E"}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});}';
  });

  if (extraScripts) {
    chartScripts += '<script>window.addEventListener("load",function(){try{'+extraScripts+'}catch(e){console.warn("Report chart error",e);}});<'+'/script>';
  }

  // Cover page

    +(brief.currentRevenue?'<div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #C5E0F7"><div style="font-size:10px;color:#185FA5;margin-bottom:3px;font-weight:500">Текущая выручка</div><div style="font-size:20px;font-weight:700;color:#0C447C">'+esc(brief.currentRevenue)+'</div></div>':'')
    +(brief.currentClients?'<div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #C5E0F7"><div style="font-size:10px;color:#185FA5;margin-bottom:3px;font-weight:500">Активных клиентов</div><div style="font-size:20px;font-weight:700;color:#0C447C">'+esc(brief.currentClients)+'</div></div>':'')
    +(brief.currentAvgCheck?'<div style="background:#fff;border-radius:8px;padding:12px;border:1px solid #C5E0F7"><div style="font-size:10px;color:#185FA5;margin-bottom:3px;font-weight:500">Средний чек</div><div style="font-size:20px;font-weight:700;color:#0C447C">'+esc(brief.currentAvgCheck)+'</div></div>':'')
    +'</div></div>' : '';

  const posBar = (hasCompany && m1r && m1r.chartData) ? '<div style="margin:12px 0"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;color:#555;font-weight:500">Доля рынка (SAM)</span><span style="font-size:12px;font-weight:700;color:#27500A" id="rpt_pos_lbl">—</span></div><div style="height:14px;background:#e8e8e8;border-radius:7px;overflow:hidden"><div id="rpt_pos_bar" style="height:100%;background:linear-gradient(90deg,#639922,#97C459);border-radius:7px;width:2%;transition:width 0.8s ease"></div></div></div>' : '';

  // Module badges
  const allModBadges = MODULES.map(m => {
    const done = results.find(r=>r.id===m.id);
    return '<span style="font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;background:'+(done?moduleBgs[m.id]:'#f0f0f0')+';color:'+(done?moduleDarks[m.id]:'#aaa')+'">'+m.id+(done?' ✓':'')+'</span>';
  }).join('');

  const cover = '<div style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:2.5rem;margin-bottom:1.5rem;color:#fff">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:1.5rem">'
    +'<div><div style="font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px">Исследование целевой аудитории</div>'
    +'<div style="font-size:30px;font-weight:700;margin-bottom:4px;letter-spacing:-0.5px">'+esc(brief.name||'—')+'</div>'
    +'<div style="font-size:14px;color:rgba(255,255,255,0.65);line-height:1.4">'+esc([brief.niche,brief.format].filter(Boolean).join(' · ')||'—')+'</div></div>'

    +'<div style="background:rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px"><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:3px">Рынок</div><div style="font-size:14px;font-weight:600;color:#fff">'+esc(brief.geoMarket||brief.geo||'—')+'</div></div>'
    +'<div style="background:rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px"><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:3px">Язык</div><div style="font-size:14px;font-weight:600;color:#fff">'+esc(lang||'—')+'</div></div>'
    +(brief.geoCompany?'<div style="background:rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px"><div style="font-size:10px;color:rgba(255,255,255,0.5);margin-bottom:3px">География</div><div style="font-size:14px;font-weight:600;color:#fff">'+esc(brief.geoCompany)+'</div></div>':'')
    +(chosenLayer?'<div style="background:rgba(239,159,39,0.2);border-radius:8px;padding:10px 14px;border:1px solid rgba(239,159,39,0.4)"><div style="font-size:10px;color:#EF9F27;margin-bottom:3px">Ценовой слой</div><div style="font-size:14px;font-weight:600;color:#EF9F27">'+esc(chosenLayer)+'</div></div>':'')
    +'</div>'
    +companyMetrics+posBar+'</div>';

  // Executive summary block
  const allInsights = targetResults.flatMap(r => extractInsights(r.content));
  const execBlock = allInsights.length > 0 ? '<div style="background:#fff;border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;border:1px solid #e5e5e5;border-left:4px solid #639922">'
    +'<p style="font-size:11px;font-weight:700;color:#27500A;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px">Ключевые выводы исследования</p>'
    +allInsights.map((ins,i) => '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0">'
      +'<span style="width:22px;height:22px;border-radius:50%;background:#EAF3DE;color:#27500A;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">'+(i+1)+'</span>'
      +'<p style="font-size:13px;line-height:1.5;color:#222;margin:0">'+esc(ins)+'</p>'
      +'</div>').join('')
    +'</div>' : '';

  // Module sections. Отсортировано так же, как строит run(): глобальные сначала, затем
  // ниша за нишей — иначе при перегенерации одной ниши (↺) её секции падают в конец списка
  // и отчёт с несколькими нишами читается вперемешку.
  const modOrderIdx = MODULES.map(m => m.id);
  const orderedResults = targetResults.slice().sort((a, b) => {
    const ga = !a.niche, gb = !b.niche;
    if (ga !== gb) return ga ? -1 : 1;
    if ((a.niche||'') !== (b.niche||'')) return (a.niche||'') < (b.niche||'') ? -1 : 1;
    return modOrderIdx.indexOf(a.id) - modOrderIdx.indexOf(b.id);
  });
  let sections = '';
  let lastNiche; // undefined до первого модуля — гарантированно отличается от '' и от любой ниши
  for (const r of orderedResults) {
    // Разделитель «Ниша: …» перед первым модулем каждой новой ниши — при 1 нише не показываем,
    // чтобы не плодить шум в самом частом случае.
    if (r.niche && r.niche !== lastNiche && nichesOf(brief).length > 1) {
      sections += '<div style="margin:28px 0 10px;padding:12px 18px;background:#1a1a2e;border-radius:10px">'
        + '<span style="font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.08em">Ниша</span> '
        + '<span style="font-size:15px;font-weight:700;color:#fff;margin-left:8px">'+esc(r.niche)+'</span></div>';
    }
    lastNiche = r.niche;
    const m = MODULES.find(x=>x.id===r.id);
    const col = moduleColors[r.id]||'#639922';
    const bg = moduleBgs[r.id]||'#EAF3DE';
    const dark = moduleDarks[r.id]||'#27500A';
    const charts = r.id==='M1' ? chartDivs : (moduleChartDivs[resKey(r)]||'');
    const dlBtn = '<button onclick="(function(){var h=document.documentElement.outerHTML;var b=new Blob([h],{type:\'text/html\'});var a=document.createElement(\'a\');a.href=URL.createObjectURL(b);a.download=\''+esc(brief.name||'report')+'_'+r.id+(r.niche?'_'+r.niche:'')+'.html\';a.click();})()" style="padding:5px 12px;background:'+col+';color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit">↓ '+r.id+'</button>';
    sections += '<div style="background:#fff;border-radius:14px;padding:1.75rem;margin-bottom:1.25rem;border:1px solid #e5e5e5">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:1.25rem;padding-bottom:10px;border-bottom:2px solid '+col+'">'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;background:'+bg+';color:'+dark+'">'+r.id+'</span>'
      +'<span style="font-size:17px;font-weight:600;color:#111">'+(m?m.title:'Module')+'</span></div>'
      +dlBtn+'</div>'
      +charts
      +mdToHtml(r.content)+'</div>';
  }

  const html = '<!DOCTYPE html>\n<html lang="ru">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1">\n<title>CA Research — '+esc(brief.name||'Report')+(singleModId?' · '+singleModId:'')+'</title>\n'
    +'<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"><\/script>\n'
    +'<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;color:#111;padding:2rem 1rem}\n.report{max-width:820px;margin:0 auto}\n@media print{body{background:#fff;padding:0}button.no-print{display:none}}\n</style>\n</head>\n<body>\n'
    +'<div class="report">\n'
    +'<div style="text-align:right;margin-bottom:16px">\n'
    +'<button class="no-print" onclick="window.print()" style="padding:9px 20px;background:#111;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500">Печать / Сохранить PDF ↓</button>\n'
    +'</div>\n'
    +cover
    +execBlock
    +sections
    +'</div>\n'
    +chartScripts
    +'\n</body>\n</html>';

  return html;
}

// ── GLOSSARY — abbreviation definitions shown inline in report
const GLOSSARY = {
  'TAM': 'Total Addressable Market — общий объём рынка, все потенциальные покупатели',
  'SAM': 'Serviceable Addressable Market — доступный рынок, который реально охватить',
  'SOM': 'Serviceable Obtainable Market — реально достижимая доля рынка',
  'JTBD': 'Jobs To Be Done — задача, которую клиент нанимает продукт решить',
  'CJM': 'Customer Journey Map — карта пути клиента от осознания до покупки',
  'LPR': 'Лицо Принимающее Решение — человек, который финально одобряет покупку',
  'VoC': 'Voice of Customer — реальные слова и цитаты клиентов из открытых источников',
  'CAC': 'Customer Acquisition Cost — стоимость привлечения одного клиента',
  'AOV': 'Average Order Value — средний чек / средняя стоимость сделки',
  'CAC_proxy': 'Оценочная стоимость привлечения клиента, рассчитанная по открытым данным',
  'AOV/CAC': 'Коэффициент эффективности: во сколько раз доход превышает стоимость привлечения',
  'MDE': 'Minimum Detectable Effect — минимальный эффект, который можно обнаружить в A/B тесте',
  'CTR': 'Click-Through Rate — процент кликов от показов рекламы',
  'CR': 'Conversion Rate — процент посетителей, совершивших целевое действие',
  'CTA': 'Call To Action — призыв к действию (кнопка, ссылка)',
  'USP': 'Unique Selling Proposition — уникальное торговое предложение',
  'UX': 'User Experience — пользовательский опыт, удобство интерфейса',
  'LP': 'Landing Page — одностраничный сайт для конвертации трафика',
  'B2B': 'Business-to-Business — продажи от бизнеса к бизнесу',
  'B2C': 'Business-to-Consumer — продажи от бизнеса конечному потребителю',
  'OSINT': 'Open Source Intelligence — разведка по открытым источникам',
  'KPI': 'Key Performance Indicator — ключевой показатель эффективности',
  'ROI': 'Return on Investment — возврат на инвестиции',
  'CPL': 'Cost Per Lead — стоимость одного лида',
  'SEO': 'Search Engine Optimization — оптимизация для поисковых систем',
};

function GlossaryTip({ term, children }) {
  const [show, setShow] = React.useState(false);
  const def = GLOSSARY[term];
  if (!def) return React.createElement(React.Fragment, null, children);
  return (
    <span style={{position:'relative',display:'inline'}}>
      <span
        onClick={e=>{e.stopPropagation();setShow(s=>!s)}}
        style={{borderBottom:'1px dashed #378ADD',cursor:'pointer',color:'inherit'}}
      >{children}</span>
      {show && (
        <span style={{position:'absolute',bottom:'100%',left:0,zIndex:10,background:'#fff',border:'1px solid #ddd',borderRadius:8,padding:'8px 10px',fontSize:11,color:'#333',lineHeight:1.5,whiteSpace:'normal',width:220,boxShadow:'0 2px 8px rgba(0,0,0,0.12)'}}>
          <strong style={{color:'#0C447C'}}>{term}</strong><br/>{def}
        </span>
      )}
    </span>
  );
}

// Wrap known glossary terms in text
function wrapGlossary(text) {
  if (!text || typeof text !== 'string') return text;
  const terms = Object.keys(GLOSSARY);
  // Only wrap if text contains these terms as standalone words
  let result = text;
  // We return plain string here; actual wrapping happens in renderCellWithGlossary
  return result;
}

function renderCellWithGlossary(text) {
  if (!text || typeof text !== 'string') return text;
  const terms = Object.keys(GLOSSARY);
  const parts = [];
  let remaining = text;
  let key = 0;

  // Simple approach: find first matching term, split, recurse
  const termPattern = new RegExp('\\b(' + terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|') + ')\\b');
  
  function processText(str) {
    const match = str.match(termPattern);
    if (!match) return [str];
    const idx = str.indexOf(match[0]);
    const before = str.slice(0, idx);
    const term = match[0];
    const after = str.slice(idx + term.length);
    return [
      before,
      React.createElement(GlossaryTip, {key: key++, term}, term),
      ...processText(after)
    ].filter(x => x !== '');
  }

  return processText(text);
}
